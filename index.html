<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0A0A0F"/>
<link rel="manifest" href="manifest.json"/>
<title>Nexus</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{background:#0A0A0F;overflow:hidden;height:100%;width:100%;overscroll-behavior:none;}
:root{
  --bg:#0A0A0F; --bg2:#111118; --bg3:#18181F;
  --card:#1C1C26; --card2:#242430;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.12);
  --ink:#F0EEF8; --ink2:#9B98B0; --ink3:#5C5970;
  --v:#8B5CF6; --v2:#6D28D9; --vg:rgba(139,92,246,0.22);
  --p:#EC4899; --pg:rgba(236,72,153,0.2);
  --g:#10B981; --gg:rgba(16,185,129,0.18);
  --a:#F59E0B; --ag:rgba(245,158,11,0.18);
  --b:#3B82F6; --bg_:rgba(59,130,246,0.18);
  --red:#EF4444; --rg:rgba(239,68,68,0.18);
  --nav:68px; --safe:env(safe-area-inset-bottom,0px);
  --top:env(safe-area-inset-top,0px);
}
::-webkit-scrollbar{width:2px;height:2px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
#root{height:100dvh;width:100%;overflow:hidden;}

/* ═══════════════ APP SHELL ═══════════════ */
.app{display:flex;flex-direction:column;height:100dvh;background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;color:var(--ink);position:relative;overflow:hidden;user-select:none;}

/* animated mesh gradient bg */
.app-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.app-bg::before{content:"";position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,0.07) 0%,transparent 70%);top:-200px;right:-150px;animation:bgPulse 8s ease-in-out infinite;}
.app-bg::after{content:"";position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(236,72,153,0.05) 0%,transparent 70%);bottom:-100px;left:-100px;animation:bgPulse 10s ease-in-out infinite reverse;}
@keyframes bgPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}

/* ═══════════════ SCREENS ═══════════════ */
.screen{position:absolute;inset:0;bottom:calc(var(--nav) + var(--safe));overflow-y:auto;overflow-x:hidden;z-index:1;-webkit-overflow-scrolling:touch;}
.screen-inner{min-height:100%;}

/* ═══════════════ TOPBAR ═══════════════ */
.topbar{position:sticky;top:0;z-index:20;padding:calc(var(--top) + 14px) 18px 12px;background:rgba(10,10,15,0.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);}
.topbar-row{display:flex;align-items:center;gap:10px;}
.logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-0.04em;background:linear-gradient(135deg,#C4B5FD,#F9A8D4,#FDE68A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-size:11.5px;color:var(--ink3);margin-top:1px;}
.ibtn{width:40px;height:40px;border-radius:13px;border:1px solid var(--border2);background:var(--card);color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;-webkit-appearance:none;}
.ibtn:active,.ibtn.on{background:var(--v);border-color:var(--v);color:#fff;box-shadow:0 0 16px var(--vg);}

/* ═══════════════ SEARCH ═══════════════ */
.search-wrap{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border2);border-radius:15px;padding:12px 14px;margin:12px 18px 0;transition:border-color .15s;}
.search-wrap:focus-within{border-color:var(--v);box-shadow:0 0 0 3px var(--vg);}
.search-wrap input{border:none;outline:none;background:transparent;font-family:'DM Sans',inherit;font-size:15px;color:var(--ink);width:100%;}
.search-wrap input::placeholder{color:var(--ink3);}

/* ═══════════════ PILLS ═══════════════ */
.pills{display:flex;gap:6px;overflow-x:auto;padding:10px 18px;scrollbar-width:none;}
.pills::-webkit-scrollbar{display:none;}
.pill{white-space:nowrap;cursor:pointer;font-family:'DM Sans',inherit;font-size:13px;font-weight:500;padding:7px 14px;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--ink2);transition:all .2s;flex-shrink:0;}
.pill.on{background:var(--v);border-color:var(--v);color:#fff;box-shadow:0 0 14px var(--vg);}

/* ═══════════════ CONTACT CARD ═══════════════ */
.ccard{display:flex;align-items:center;gap:13px;padding:13px 18px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border);}
.ccard:active{background:rgba(139,92,246,0.06);}
.ava{flex-shrink:0;border-radius:15px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:'Syne',sans-serif;overflow:hidden;background-size:cover;background-position:center;}
.ava-md{width:48px;height:48px;font-size:15px;}
.ava-lg{width:90px;height:90px;font-size:28px;border-radius:26px;}
.ava-sm{width:34px;height:34px;font-size:11px;border-radius:10px;}
.ccard-body{flex:1;min-width:0;}
.ccard-name{font-size:15.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ccard-meta{font-size:12.5px;color:var(--ink2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lvl-dots{display:flex;gap:3px;align-items:center;}
.lvl-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);}
.bday-pip{font-size:10px;font-weight:600;color:var(--a);background:var(--ag);padding:3px 8px;border-radius:100px;}

/* ═══════════════ SECTION LABEL ═══════════════ */
.sec{font-family:'Syne',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);padding:14px 18px 6px;}

/* ═══════════════ BIRTHDAY BANNER ═══════════════ */
.bday-banner{margin:8px 18px;background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(245,158,11,0.04));border:1px solid rgba(245,158,11,0.2);border-radius:16px;padding:13px 15px;}
.bday-banner h4{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--a);display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.bday-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:3px 0;cursor:pointer;}
.bday-row b{color:var(--a);}

/* ═══════════════ BOTTOM NAV ═══════════════ */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,15,0.96);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-top:1px solid var(--border);display:flex;align-items:stretch;height:calc(var(--nav) + var(--safe));padding-bottom:var(--safe);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--ink3);transition:all .18s;padding-top:8px;}
.nav-item.on{color:var(--v);}
.nav-item.on .nav-ico{filter:drop-shadow(0 0 6px var(--vg));}
.nav-lbl{font-size:9.5px;font-weight:600;letter-spacing:0.02em;}
.fab-wrap{flex:0 0 68px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding-top:0;}
.fab{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,var(--v),var(--p));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(139,92,246,0.45);transition:all .2s;margin-top:-22px;}
.fab:active{transform:scale(0.9);}

/* ═══════════════ OVERLAY / SHEET ═══════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease;}
.overlay.center{align-items:center;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-height:95dvh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.2,.9,.2,1);}
.sheet.sm{max-width:460px;border-radius:24px;margin:16px;max-height:calc(100dvh - 32px);}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:10px auto 0;}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;position:sticky;top:0;background:var(--bg2);z-index:2;border-bottom:1px solid var(--border);}
.sheet-head h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.02em;}
.sheet-body{padding:16px 18px 36px;}

/* ═══════════════ FORM ═══════════════ */
.field{margin-bottom:14px;}
.field label{display:block;font-size:10.5px;font-weight:700;color:var(--ink3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;}
.inp,.ta{width:100%;font-family:'DM Sans',inherit;font-size:15px;color:var(--ink);background:var(--card);border:1.5px solid var(--border2);border-radius:14px;padding:13px 15px;outline:none;transition:all .18s;-webkit-appearance:none;}
.inp:focus,.ta:focus{border-color:var(--v);box-shadow:0 0 0 3px var(--vg);}
.inp::placeholder,.ta::placeholder{color:var(--ink3);}
.ta{resize:vertical;min-height:72px;line-height:1.55;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sel{font-family:'DM Sans',inherit;font-size:13.5px;color:var(--ink);background:var(--card);border:1.5px solid var(--border2);border-radius:12px;padding:11px 10px;outline:none;width:auto;flex-shrink:0;}

/* ═══════════════ BUTTONS ═══════════════ */
.btn{font-family:'DM Sans',inherit;cursor:pointer;border:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:14.5px;font-weight:600;border-radius:15px;padding:13px 18px;transition:all .18s;min-height:50px;-webkit-appearance:none;}
.btn:disabled{opacity:.38;}
.btn-primary{background:linear-gradient(135deg,var(--v),var(--p));color:#fff;box-shadow:0 4px 20px rgba(139,92,246,0.35);}
.btn-primary:active{transform:translateY(1px);box-shadow:0 2px 10px rgba(139,92,246,0.3);}
.btn-ghost{background:var(--card);color:var(--ink2);border:1.5px solid var(--border2);}
.btn-ghost:active{background:var(--card2);}
.btn-danger{background:var(--rg);color:var(--red);border:1.5px solid rgba(239,68,68,0.2);}
.btn-green{background:var(--gg);color:var(--g);border:1.5px solid rgba(16,185,129,0.25);}
.btn-row{display:flex;gap:10px;margin-top:18px;}
.btn-row .btn{flex:1;}

/* ═══════════════ LEVEL SELECTOR ═══════════════ */
.lvl-bar{display:flex;gap:5px;margin-bottom:6px;}
.lvl-btn{flex:1;height:40px;border-radius:10px;border:1.5px solid var(--border2);background:var(--card);cursor:pointer;font-weight:800;font-size:14px;color:var(--ink3);font-family:'Syne',sans-serif;transition:all .15s;}
.lvl-name{font-size:12px;color:var(--ink2);text-align:center;}

/* ═══════════════ TAGS ═══════════════ */
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:500;padding:6px 11px;border-radius:100px;cursor:pointer;border:1.5px solid;transition:all .15s;}

/* ═══════════════ VOICE PANEL ═══════════════ */
.voice-panel{border-radius:20px;padding:16px;margin-bottom:16px;background:linear-gradient(135deg,rgba(139,92,246,0.12),rgba(236,72,153,0.08));border:1.5px solid rgba(139,92,246,0.2);position:relative;overflow:hidden;}
.voice-panel::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(139,92,246,0.04));pointer-events:none;}
.vp-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--v);display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.vp-sub{font-size:12.5px;color:var(--ink2);margin-bottom:12px;line-height:1.45;}
.vp-ta{width:100%;font-family:'DM Sans',inherit;font-size:14.5px;color:var(--ink);background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:13px;padding:12px 14px;outline:none;resize:none;min-height:58px;line-height:1.5;transition:border-color .15s;}
.vp-ta:focus{border-color:rgba(139,92,246,0.45);}
.vp-ta::placeholder{color:var(--ink3);}
.vp-actions{display:flex;gap:8px;margin-top:9px;}
.vp-btn{flex:1;height:44px;border-radius:12px;border:none;cursor:pointer;font-family:'DM Sans',inherit;font-weight:600;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s;}
.vp-main{background:linear-gradient(135deg,var(--v),var(--p));color:#fff;box-shadow:0 3px 14px rgba(139,92,246,0.35);}
.vp-main:disabled{opacity:.45;box-shadow:none;}
.vp-ghost{background:rgba(255,255,255,0.07);color:var(--ink2);border:1.5px solid var(--border2);}
.mic-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);color:var(--ink2);flex-shrink:0;transition:all .2s;}
.mic-btn.rec{background:var(--red);color:#fff;animation:recPulse 1.3s infinite;}
@keyframes recPulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)}70%{box-shadow:0 0 0 14px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
.vp-note{font-size:12.5px;color:var(--ink2);margin-top:9px;line-height:1.45;padding:9px 11px;background:rgba(255,255,255,0.04);border-radius:10px;display:flex;align-items:flex-start;gap:7px;}

/* ═══════════════ TINDER CARD ═══════════════ */
.tinder-wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
.tinder-stack{position:relative;width:calc(100% - 36px);max-width:380px;height:460px;margin:0 auto;}
.tcard{position:absolute;inset:0;border-radius:28px;overflow:hidden;cursor:grab;touch-action:none;transform-origin:50% 110%;will-change:transform;transition:box-shadow .2s;}
.tcard:active{cursor:grabbing;}
.tcard-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.tcard-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.9) 0%,rgba(0,0,0,0.3) 50%,transparent 100%);}
.tcard-body{position:absolute;bottom:0;left:0;right:0;padding:22px;}
.tcard-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-0.02em;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.5);}
.tcard-meta{font-size:14px;color:rgba(255,255,255,0.75);margin-top:4px;}
.tcard-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.tcard-tag{font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:100px;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);color:#fff;border:1px solid rgba(255,255,255,0.2);}
.tcard-add-stamp{position:absolute;top:20px;left:20px;background:linear-gradient(135deg,var(--g),#059669);color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:0.05em;padding:8px 16px;border-radius:12px;border:3px solid var(--g);transform:rotate(-15deg);opacity:0;transition:opacity .15s;text-shadow:none;}
.tcard-skip-stamp{position:absolute;top:20px;right:20px;background:linear-gradient(135deg,var(--red),#DC2626);color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:0.05em;padding:8px 16px;border-radius:12px;border:3px solid var(--red);transform:rotate(15deg);opacity:0;transition:opacity .15s;}
.tinder-btns{display:flex;justify-content:center;align-items:center;gap:18px;padding:18px 0 8px;}
.t-btn{border:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.t-btn:active{transform:scale(0.88);}
.t-skip{width:60px;height:60px;background:rgba(239,68,68,0.15);border:2px solid rgba(239,68,68,0.35);color:var(--red);}
.t-add{width:72px;height:72px;background:linear-gradient(135deg,var(--g),#059669);color:#fff;box-shadow:0 6px 24px rgba(16,185,129,0.4);}
.t-info{width:50px;height:50px;background:rgba(139,92,246,0.15);border:2px solid rgba(139,92,246,0.35);color:var(--v);}
.tinder-progress{text-align:center;font-size:13px;color:var(--ink3);margin-top:2px;}
.tinder-empty{text-align:center;padding:60px 28px;}
.tinder-hint{display:flex;justify-content:center;gap:20px;padding:6px 20px 0;font-size:11.5px;color:var(--ink3);}
.tinder-hint span{display:flex;align-items:center;gap:4px;}

/* ═══════════════ QUICK-ADD FLOW ═══════════════ */
.qa-screen{position:fixed;inset:0;z-index:210;background:var(--bg);display:flex;flex-direction:column;animation:fadeIn .2s ease;}
.qa-top{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--top) + 14px) 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.qa-top h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.qa-body{flex:1;overflow-y:auto;padding:20px 18px 24px;}
.qa-progress{height:3px;background:var(--border);margin:0 18px;border-radius:2px;overflow:hidden;}
.qa-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--v),var(--p));transition:width .35s cubic-bezier(.2,.9,.2,1);}
.qa-step{animation:stepIn .28s cubic-bezier(.2,.9,.2,1);}
@keyframes stepIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
.qa-q{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px;line-height:1.15;}
.qa-hint{font-size:13.5px;color:var(--ink2);margin-bottom:18px;line-height:1.5;}
.qa-meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--ink3);margin-bottom:18px;}
.qa-switch{background:none;border:none;color:var(--v);font-family:inherit;font-size:12px;cursor:pointer;}
.qa-nav{display:flex;gap:10px;margin-top:20px;align-items:center;}
.qa-back{width:50px;height:50px;border-radius:14px;border:1.5px solid var(--border2);background:var(--card);color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qa-next{flex:1;height:52px;border-radius:15px;border:none;background:linear-gradient(135deg,var(--v),var(--p));color:#fff;font-family:'DM Sans',inherit;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(139,92,246,0.35);}
.qa-next:disabled{opacity:.4;box-shadow:none;}
.qa-skip{display:block;width:100%;text-align:center;margin-top:12px;background:none;border:none;color:var(--ink3);font-family:inherit;font-size:13px;cursor:pointer;padding:6px;}
.qa-save-now{display:block;width:100%;text-align:center;margin-top:6px;background:none;border:none;color:var(--v);font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;padding:6px;}

/* ═══════════════ TG IMPORT ═══════════════ */
.tg-card{background:linear-gradient(135deg,rgba(59,130,246,0.1),rgba(59,130,246,0.05));border:1.5px solid rgba(59,130,246,0.2);border-radius:18px;padding:16px;margin-bottom:14px;}
.tg-card h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--b);display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.tg-card p{font-size:13px;color:var(--ink2);line-height:1.5;margin-bottom:12px;}
.tg-steps{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.tg-step{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--ink2);}

/* ═══════════════ SMART LOCAL PARSER (offline, zero tokens) ═══════════════ */
function smartParse(raw){
  const text=raw.trim();
  const out={name:"",phone:"",email:"",company:"",position:"",birthday:"",metPlace:"",metWhen:"",level:null,tags:[],socials:[],notes:""};
  let rest=text;
  const emRx=/[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}/g;
  const emails=[...rest.matchAll(emRx)];
  if(emails.length){out.email=emails[0][0];rest=rest.replace(emails[0][0],"").trim();}
  const phRx=/(?:\+7|8|7)?[\s\-.(]?\(?\d{3}\)?[\s\-.]?\d{3}[\s\-.]?\d{2}[\s\-.]?\d{2}/g;
  const phones=[...rest.matchAll(phRx)];
  if(phones.length){out.phone=phones[0][0].trim();rest=rest.replace(phones[0][0],"").trim();}
  const socPat=[
    {type:"Telegram",rx:/(?:telegram|тг|tg|telega)[:\s]*(@[\w\d_]{3,}|t\.me\/[\w\d_]+)/i},
    {type:"Telegram",rx:/@([\w\d_]{3,})/i},
    {type:"WhatsApp",rx:/whatsapp[:\s]*([\+\d][\d\s\-]{7,})/i},
    {type:"Instagram",rx:/(?:instagram|инстаграм|insta|inst)[:\s]*(@?[\w\d._]+)/i},
    {type:"VK",rx:/(?:vk(?:\.com)?|вконтакте|вк)[:/\s]*([\w\d._]+)/i},
    {type:"LinkedIn",rx:/linkedin\.com\/in\/([\w\d\-]+)/i},
    {type:"X (Twitter)",rx:/(?:twitter|x\.com|твиттер)[:\s]*(@?[\w\d_]+)/i},
    {type:"TikTok",rx:/tiktok[:\s]*(@?[\w\d._]+)/i},
  ];
  const usedS=new Set();
  socPat.forEach(({type,rx})=>{
    const m=rest.match(rx);
    if(m&&!usedS.has(m[0].toLowerCase())){
      let val=m[1].startsWith("@")?m[1]:"@"+m[1];
      if(type==="LinkedIn"||type==="WhatsApp")val=m[1];
      if(!out.socials.find(s=>s.type===type)){out.socials.push({type,value:val});usedS.add(m[0].toLowerCase());rest=rest.replace(m[0],"").trim();}
    }
  });
  // t.me/username → Telegram
  const tmeRx=/(?:t\.me|telegram\.me)\/(@?[\w\d_]+)/i;
  const tme=rest.match(tmeRx);
  if(tme&&!out.socials.find(s=>s.type==="Telegram")){out.socials.push({type:"Telegram",value:"@"+tme[1].replace(/^@/,"")});rest=rest.replace(tme[0],"").trim();}
  const bdFull=rest.match(/(\d{1,2})[./](\d{1,2})[./](\d{4})/);
  if(bdFull){out.birthday=`${bdFull[3]}-${bdFull[2].padStart(2,"0")}-${bdFull[1].padStart(2,"0")}`;rest=rest.replace(bdFull[0],"").trim();}
  else{
    const RU_MONTH_RX=/(\d{1,2})\s*(янв\w*|фев\w*|мар\w*|апр\w*|ма[йя]\w*|июн\w*|июл\w*|авг\w*|сен\w*|окт\w*|ноя\w*|дек\w*)(?:\s+(\d{4}))?/i;
    const mbm=rest.match(RU_MONTH_RX);
    if(mbm){const mN={янв:1,фев:2,мар:3,апр:4,май:5,ма:5,июн:6,июл:7,авг:8,сен:9,окт:10,ноя:11,дек:12};const mk=mbm[2].slice(0,3).toLowerCase();const mn=mN[mk];if(mn){out.birthday=`${mbm[3]||new Date().getFullYear()}-${String(mn).padStart(2,"0")}-${mbm[1].padStart(2,"0")}`;rest=rest.replace(mbm[0],"").trim();}}
  }
  const metRx=/(?:познакомил[иь]сь?|встретил[иь]сь?|увидел[иь]сь?)\s+(?:на|в|у|через)\s+([^,\.;!?\n]+)/i;
  const mp=rest.match(metRx);if(mp){out.metPlace=mp[1].trim();rest=rest.replace(mp[0],"").trim();}
  const plHint=rest.match(/(?:на|в|через)\s+(конференц\w+|вечер\w+|форум\w+|хакатон\w+|митап\w+|встреч\w+|выставк\w+|семинар\w+|тренинг\w+|курс\w+|работ\w+|друг\w+|общих друзей?)/i);
  if(plHint&&!out.metPlace){out.metPlace=plHint[0].trim();rest=rest.replace(plHint[0],"").trim();}
  const mwRx=/(?:в\s+)?(январ\w+|феврал\w+|март\w+|апрел\w+|ма[йя]\w+|июн\w+|июл\w+|август\w+|сентябр\w+|октябр\w+|ноябр\w+|декабр\w+)\s+(\d{4})/i;
  const mw=rest.match(mwRx);if(mw){out.metWhen=mw[0].trim();rest=rest.replace(mw[0],"").trim();}
  else{const yH=rest.match(/(?:год[ау]?|в\s+)?(\d{4})\s*(?:год[ау]?)?/);if(yH&&parseInt(yH[1])>=2000&&parseInt(yH[1])<=new Date().getFullYear()){out.metWhen=yH[1];rest=rest.replace(yH[0],"").trim();}}
  const agoH=rest.match(/(недавно|вчера|на прошлой неделе|месяц назад|полгода назад|год назад)/i);
  if(agoH&&!out.metWhen){out.metWhen=agoH[1];rest=rest.replace(agoH[0],"").trim();}
  const lvlMap=[[6,/\b(очень близк\w+|лучший друг|близкий человек|родной|близк\w+ друг)\b/i],[5,/\b(друг|подруга|давний друг|хороший друг)\b/i],[4,/\b(хороший знакомый|хорошо знаком\w*)\b/i],[3,/\b(приятель|приятельница|знаком\w+ уже давно)\b/i],[2,/\b(знакомый|знакомая|немного знаком\w*)\b/i],[1,/\b(знаю по имени|едва знаком\w*|видел\w* разок)\b/i]];
  for(const[n,rx]of lvlMap){if(rx.test(rest)){out.level=n;rest=rest.replace(rx,"").trim();break;}}
  const posW="(?:CEO|CTO|CFO|COO|CMO|генеральный директор|директор|руководитель|менеджер|разработчик|программист|дизайнер|аналитик|маркетолог|продюсер|редактор|журналист|врач|юрист|адвокат|бухгалтер|финансист|инженер|архитектор|консультант|тренер|коуч|продавец|предприниматель|основатель|co-founder|founder|head of|lead)";
  const posRx=new RegExp(`(${posW})(?:\\s+(?:в|at|@)\\s+([\\w\\s«»"']+?))?(?=[,\\.;!?\\n]|$)`,"i");
  const posM=rest.match(posRx);if(posM){out.position=posM[1].trim();if(posM[2])out.company=posM[2].trim().replace(/[«»"']/g,"");rest=rest.replace(posM[0],"").trim();}
  const cmpRx=/(?:работает в|работаю в|из компании|компания|в компании|сотрудник|сотрудница)\s+([\w\s«»"'\.]+?)(?=[,\.;!?\n]|$)/i;
  const cmpM=rest.match(cmpRx);if(cmpM&&!out.company){out.company=cmpM[1].trim().replace(/[«»"']/g,"");rest=rest.replace(cmpM[0],"").trim();}
  const knownCo=["Яндекс","Сбер","Тинькофф","ВТБ","Газпром","Лукойл","Мегафон","МТС","Билайн","Авито","Озон","Wildberries","ВКонтакте","Rambler","Mail","Google","Apple","Microsoft","Amazon","Meta","Netflix","Spotify","Tesla","Uber","Airbnb","Samsung","Huawei","Kaspersky"];
  for(const co of knownCo){const coRx=new RegExp(`\\b${co}\\b`,"i");if(coRx.test(rest)&&!out.company){out.company=co;rest=rest.replace(coRx,"").trim();break;}}
  const tagKW=[["стартап","стартапер","основатель","фаундер"],["инвестор","инвестиции","венчур"],["дизайн","дизайнер","UI","UX","продукт"],["разработка","программист","разработчик","IT","айти","backend","frontend","fullstack","девелопер"],["маркетинг","маркетолог","SMM","контент"],["бизнес","предприниматель","CEO","фриланс","фрилансер"],["музыка","музыкант","продюсер"],["спорт","спортсмен","тренер","фитнес"],["медицина","врач","доктор","медик"],["юриспруденция","юрист","адвокат","право"],["финансы","финансист","инвестиции","бухгалтер","трейдер"],["наука","ученый","исследователь","аспирант","PhD"],["образование","учитель","преподаватель","педагог"],["творчество","художник","фотограф","иллюстратор","артист"]];
  const tagLbls=["стартап","инвестор","дизайн","разработка","маркетинг","бизнес","музыка","спорт","медицина","юриспруденция","финансы","наука","образование","творчество"];
  const tLow=text.toLowerCase();
  tagKW.forEach((kws,i)=>{if(kws.some(kw=>tLow.includes(kw.toLowerCase()))&&!out.tags.includes(tagLbls[i]))out.tags.push(tagLbls[i]);});
  const nmRx=/^([А-ЯЁA-Z][а-яёa-z]+(?:\s+[А-ЯЁA-Z][а-яёa-z]+){0,2})/;
  const nm=text.match(nmRx);
  if(nm)out.name=nm[1].trim();
  else{const nRx=/(?:зовут|это|имя|её зовут|его зовут|знакомься)\s+([А-ЯЁA-Z][а-яёa-z]+(?:\s+[А-ЯЁA-Z][а-яёa-z]+)?)/i;const nM=rest.match(nRx);if(nM){out.name=nM[1].trim();rest=rest.replace(nM[0],"").trim();}}
  rest=rest.replace(/\s{2,}/g," ").replace(/^[,;.\s]+|[,;.\s]+$/g,"").trim();
  if(rest.length>10&&rest!==out.name)out.notes=rest;
  return out;
}

  const doFill=async()=>{const text=aiText.trim();if(!text)return;setAiBusy(true);setAiNote("");
    if(recording&&recRef.current)recRef.current.stop();
    const parsed=smartParse(text);applyP(parsed);setAiText("");
    const found=[];if(parsed.name)found.push("имя");if(parsed.phone)found.push("тел");if(parsed.email)found.push("email");if(parsed.company)found.push("компания");if(parsed.position)found.push("должность");if(parsed.socials?.length)found.push(parsed.socials.map(s=>s.type).join(", "));if(parsed.tags?.length)found.push("теги");
    if(found.length)setAiNote("✓ "+found.join(" · "));else setAiNote("Не распознано — заполните вручную");
    if(apiKey){
      try{const pr=`Уточни карточку. Уже: ${JSON.stringify(parsed)}. Текст: "${text}". ТОЛЬКО JSON: {"name":"","phone":"","email":"","company":"","position":"","birthday":"","metPlace":"","metWhen":"","level":null,"tags":[],"socials":[{"type":"","value":""}],"notes":""}`;
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:MODEL,max_tokens:600,messages:[{role:"user",content:pr}]})});
      const data=await r.json();if(!data.error){const raw=(data.content||[]).map(b=>b.type==="text"?b.text:"").join("").replace(/```json|```/g,"").trim();applyP(JSON.parse(raw));setAiNote("✓ Разобрано локально + AI уточнил");}}catch(e){}
    }
    setAiBusy(false);

  const toggleRec=()=>{if(recording){recRef.current?.stop();return;}setAiNote("");
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){setAiNote("Голосовой ввод недоступен");return;}

  const fromImg=async e=>{const file=e.target.files?.[0];if(!file)return;e.target.value="";if(!apiKey){setAiNote("Для скриншота нужен API-ключ");return;}setOcrBusy(true);setAiNote("");
    try{const d=await compressImg(file,1200,0.85);const b64=d.split(",")[1];const pr=`Скриншот профиля. Извлеки данные. ТОЛЬКО JSON: {"name":"","phone":"","email":"","company":"","position":"","birthday":"","metPlace":"","metWhen":"","level":null,"tags":[],"socials":[{"type":"","value":""}],"notes":""}. @username → socials. bio → notes.`;
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:MODEL,max_tokens:700,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:pr}]}]})});
    const data=await r.json();if(data.error)throw new Error(data.error.message);const raw=(data.content||[]).map(b=>b.type==="text"?b.text:"").join("").replace(/```json|```/g,"").trim();applyP(JSON.parse(raw));setAiNote("✓ Скриншот распознан");}

  /* Tinder logic */

    else{card.style.transform="translate(0,0) rotate(0deg)";const add=card.querySelector(".tcard-add-stamp"),skip=card.querySelector(".tcard-skip-stamp");if(add)add.style.opacity=0;if(skip)skip.style.opacity=0;}
  };

  /* import / export */
  function decodeQP(s){s=s.replace(/=\r?\n/g,"");const b=[];for(let i=0;i<s.length;i++){if(s[i]==="="&&/^[0-9A-Fa-f]{2}$/.test(s.substr(i+1,2))){b.push(parseInt(s.substr(i+1,2),16));i+=2;}else b.push(s.charCodeAt(i));}try{return new TextDecoder("utf-8").decode(new Uint8Array(b));}catch(e){return s;}}
  function parseVCF(text){const cards=text.split(/BEGIN:VCARD/i).slice(1);const out=[];

    const name=(fn||nn).trim();if(name)out.push({name,phone:tel,email,company:org,position:title});});return out;}
  const mergeImport=rows=>{
    const exP=new Set(contacts.map(c=>{const n=String(c.phone||"").replace(/\D/g,"");return n.length>=10?n.slice(-10):"";}).filter(Boolean));
    const exN=new Set(contacts.map(c=>c.name.trim().toLowerCase()).filter(Boolean));
    const seenP=new Set(),seenN=new Set();let added=0,skipped=0;const fresh=[];
    rows.forEach(r=>{if(!r?.name?.trim())return;const np=String(r.phone||"").replace(/\D/g,"").slice(-10),nn=r.name.trim().toLowerCase();
      const dup=(np&&(exP.has(np)||seenP.has(np)))||(!np&&(exN.has(nn)||seenN.has(nn)));

                <input className="inp" type="password" value={keyDraft} onChange={e=>setKeyDraft(e.target.value)} placeholder="sk-ant-…" style={{marginBottom:10}}/>

              <div className="stat-grid">

              <div className="set-blk">

                {LEVELS.slice().reverse().map(l=>{const ct=(contacts.filter(c=>c.level===l.n)||[]).length;const mx=Math.max(1,...LEVELS.map(ll=>contacts.filter(c=>c.level===ll.n).length));return(

                  </div>
                );})}
              </div>
              <div className="set-blk">
                <div className="set-blk-title"><Ic n="down" s={14} st={{color:"var(--v)"}}/>Резервная копия</div>
                <div className="set-note">Данные хранятся только на устройстве. Сохраняйте бэкап регулярно.</div>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <button className="btn btn-ghost" style={{flex:1,height:42,minHeight:"unset",fontSize:13}} onClick={()=>bkpRef.current.click()}><Ic n="up" s={13}/>Восстановить</button>
                  <button className="btn btn-primary" style={{flex:1,height:42,minHeight:"unset",fontSize:13}} onClick={exportBackup} disabled={!contacts.length}><Ic n="down" s={13}/>Сохранить</button>

                <input ref={bkpRef} type="file" accept=".json" onChange={importFile} style={{display:"none"}}/>
              </div>
              <div style={{textAlign:"center",color:"var(--ink3)",fontSize:12,padding:"4px 0 16px"}}>Nexus v2.1 · всё хранится на вашем устройстве</div>

          </div>

      {/* ── BOTTOM NAV ── */}
      <div className="nav">
        <div className={"nav-item"+(tab==="contacts"?" on":"")} onClick={()=>{setTab("contacts");setTinderMode(false);}}>
          <span className="nav-ico"><Ic n="users" s={22}/></span><span className="nav-lbl">Контакты</span>
        </div>
        <div className={"nav-item"+(tab==="insights"?" on":"")} onClick={()=>setTab("insights")}>

          <span className="nav-ico"><Ic n="net" s={22}/></span><span className="nav-lbl">Карта</span>
        </div>
        <div className={"nav-item"+(tab==="settings"?" on":"")} onClick={()=>setTab("settings")}>
          <span className="nav-ico"><Ic n="cog" s={22}/></span><span className="nav-lbl">Настройки</span>
        </div>
      </div>

      {/* ════════════ MODALS ════════════ */}

      {/* DETAIL */}
      {viewing&&(()=>{const ph=photos[viewing.id],li=lvlOf(viewing.level),rels=relations.filter(r=>r.a===viewing.id||r.b===viewing.id);return(
        <div className="overlay" onClick={()=>setViewId(null)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"/>

              <button className="ibtn" onClick={()=>setViewId(null)}><Ic n="chevL" s={17}/></button>
              <div style={{display:"flex",gap:8}}>
                <button className="ibtn" onClick={()=>openEdit(viewing)}><Ic n="pencil" s={15}/></button>
                <button className="ibtn" style={{color:"var(--red)"}} onClick={()=>setConfirmId(viewing.id)}><Ic n="trash" s={15}/></button>
              </div>
            </div>
            <div className="detail-hero">
              <div className="ava ava-lg" style={ph?{backgroundImage:"url("+ph+")"}:{background:clrFor(viewing.name)}}>{!ph&&ini(viewing.name)}</div>
              <div className="detail-name">{viewing.name}</div>
              {(viewing.position||viewing.company)&&<div className="detail-role">{[viewing.position,viewing.company].filter(Boolean).join(" · ")}</div>}
              {li&&<div className="lvl-pill" style={{background:li.c+"22",color:li.c}}><div className="lvl-dots">{[1,2,3,4,5,6].map(i=><div key={i} className="lvl-dot" style={{background:i<=viewing.level?li.c:"var(--border2)"}}/>)}</div>{li.label}</div>}
              {(viewing.tags||[]).length>0&&<div className="detail-tags">{viewing.tags.map(t=>{const tc=tagClr(t);return<span key={t} className="tag" style={{background:tc.bg,borderColor:tc.brd,color:tc.tx,cursor:"default"}}>{t}</span>;})}</div>}
            </div>
            <div className="qa-row">
              {viewing.phone&&<a href={"tel:"+viewing.phone} className="qa-action"><Ic n="phone" s={18} st={{color:"var(--v)"}}/><span>Звонок</span></a>}
              {viewing.email&&<a href={"mailto:"+viewing.email} className="qa-action"><Ic n="mail" s={18} st={{color:"var(--v)"}}/><span>Email</span></a>}
              {(viewing.socials||[]).slice(0,1).map(s=><div key={s.type} className="qa-action"><Ic n="send" s={18} st={{color:"var(--v)"}}/><span>{s.type}</span></div>)}
              <div className="qa-action" onClick={()=>{setRelForId(viewing.id);setRelOther("");setRelLabel("");setRelSrch("");}}><Ic n="link" s={18} st={{color:"var(--v)"}}/><span>Связь</span></div>
            </div>
            <div className="info-list">
              {viewing.phone&&<a className="info-row" href={"tel:"+viewing.phone}><div className="info-ico"><Ic n="phone" s={15}/></div><div><div className="info-lbl">Телефон</div><div className="info-val">{viewing.phone}</div></div></a>}
              {viewing.email&&<a className="info-row" href={"mailto:"+viewing.email}><div className="info-ico"><Ic n="mail" s={15}/></div><div><div className="info-lbl">Email</div><div className="info-val">{viewing.email}</div></div></a>}
              {viewing.company&&<div className="info-row"><div className="info-ico"><Ic n="building" s={15}/></div><div><div className="info-lbl">Компания</div><div className="info-val">{viewing.company}</div></div></div>}
              {viewing.metPlace&&<div className="info-row"><div className="info-ico"><Ic n="pin" s={15}/></div><div><div className="info-lbl">Знакомство</div><div className="info-val">{viewing.metPlace}{viewing.metWhen?" · "+viewing.metWhen:""}</div></div></div>}
              {viewing.birthday&&<div className="info-row"><div className="info-ico"><Ic n="cake" s={15}/></div><div><div className="info-lbl">День рождения</div><div className="info-val">{fmtBday(viewing.birthday)}{(()=>{const d=daysUntil(viewing.birthday);return d!==null&&d<=30?<span style={{marginLeft:8,fontSize:12,color:"var(--a)"}}>{d===0?"сегодня!":"через "+d+" "+plurD(d)}</span>:null;})()}</div></div></div>}
              {(viewing.socials||[]).map((s,i)=><div key={i} className="info-row"><div className="info-ico"><Ic n="send" s={14}/></div><div><div className="info-lbl">{s.type}</div><div className="info-val">{s.value}</div></div></div>)}
            </div>
            {viewing.notes&&<div style={{padding:"0 18px"}}><div className="sec-in"><Ic n="note" s={12}/>Заметки</div><div className="note-box">{viewing.notes}</div></div>}
            <div>
              <div className="sec-in"><Ic n="net" s={12}/>Связи{rels.length>0&&<span style={{color:"var(--v)",marginLeft:4}}>({rels.length})</span>}</div>
              {rels.map(r=>{const oid=r.a===viewing.id?r.b:r.a;const o=contacts.find(c=>c.id===oid);if(!o)return null;return(
                <div key={r.id} className="rel-row">
                  <div className="ava ava-sm" style={{background:clrFor(o.name)}}>{ini(o.name)}</div>
                  <span className="rel-name" onClick={()=>setViewId(o.id)}>{o.name}</span>
                  {r.label&&<span className="rel-chip">{r.label}</span>}
                  <button style={{border:"none",background:"transparent",marginLeft:"auto",cursor:"pointer",color:"var(--ink3)",padding:"4px"}} onClick={()=>rmRel(r.id)}><Ic n="x" s={13}/></button>
                </div>
              );})}
              <div style={{padding:"8px 18px 24px"}}><button className="add-dashed" onClick={()=>{setRelForId(viewing.id);setRelOther("");setRelLabel("");setRelSrch("");}}>
                <Ic n="plus" s={13}/>Добавить связь
              </button></div>
            </div>
          </div>
        </div>
      );})()}

      {/* QUICK-ADD (wizard) */}
      {showForm&&wizMode&&(
        <div className="qa-screen">

            <button className="ibtn" onClick={()=>setShowForm(false)}><Ic n="x" s={18}/></button>

            <button className="ibtn" style={{fontSize:12,width:"auto",padding:"0 10px",fontFamily:"inherit",color:"var(--v)"}} onClick={()=>setWizMode(false)}>Все поля</button>
          </div>
          <div className="qa-progress"><div className="qa-bar" style={{width:((wizStep+1)/WSTEPS.length*100)+"%"}}/></div>
          <div className="qa-body">
            <div className="qa-meta"><span>Шаг {wizStep+1} / {WSTEPS.length}</span></div>
            <div className="qa-step" key={wizStep}>
              <div className="qa-q">{wizCur.q}</div>
              {wizCur.hint&&<div className="qa-hint">{wizCur.hint}</div>}
              {wizCur.body}
            </div>
            <div className="qa-nav">
              <button className="qa-back" onClick={()=>setWizStep(s=>Math.max(0,s-1))} disabled={wizStep===0}><Ic n="arL" s={19}/></button>
              {wizLast?<button className="qa-next" onClick={saveContact} disabled={!form.name.trim()}><Ic n="check" s={17}/>Сохранить</button>:<button className="qa-next" onClick={()=>setWizStep(s=>s+1)} disabled={wizCur.req&&!form.name.trim()}>Дальше<Ic n="arR" s={17}/></button>}
            </div>
            {!wizCur.req&&!wizLast&&<button className="qa-skip" onClick={()=>setWizStep(s=>s+1)}>Пропустить</button>}
            {!wizLast&&form.name.trim()&&<button className="qa-save-now" onClick={saveContact}>⚡ Сохранить сейчас</button>}
          </div>
        </div>
      )}

      {/* FULL FORM (edit / all fields) */}
      {showForm&&!wizMode&&(
        <div className="overlay" onClick={()=>setShowForm(false)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"/>
            <div className="sheet-head"><h2>{editId?"Редактировать":"Новый контакт"}</h2><button className="ibtn" onClick={()=>setShowForm(false)}><Ic n="x" s={17}/></button></div>
            <div className="sheet-body">
              {voicePanel}
              <div className="field"><label>Фото</label>
                <div className="photo-pick">
                  <div className="photo-prev" style={form.photo?{backgroundImage:"url("+form.photo+")"}:{}}>{!form.photo&&<Ic n="user" s={22}/>}</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button className="btn btn-ghost" style={{height:40,minHeight:"unset",padding:"0 14px",fontSize:13}} onClick={()=>photoRef.current.click()}><Ic n="cam" s={14}/>{form.photo?" Заменить":" Добавить"}</button>
                    {form.photo&&<button className="btn btn-ghost" style={{height:40,minHeight:"unset",padding:"0 12px",fontSize:13}} onClick={()=>setF("photo","")}>Убрать</button>}
                  </div>
                  <input ref={photoRef} type="file" accept="image/*" onChange={pickPhoto} style={{display:"none"}}/>
                </div>
              </div>
              <div className="field"><label>Имя *</label><input className="inp" value={form.name} onChange={e=>setF("name",e.target.value)} placeholder="Иван Петров"/></div>
              <div className="row2"><div className="field"><label>Телефон</label><input className="inp" inputMode="tel" value={form.phone} onChange={e=>setF("phone",e.target.value)}/></div><div className="field"><label>Email</label><input className="inp" inputMode="email" value={form.email} onChange={e=>setF("email",e.target.value)}/></div></div>
              <div className="row2"><div className="field"><label>Компания</label><input className="inp" value={form.company} onChange={e=>setF("company",e.target.value)}/></div><div className="field"><label>Должность</label><input className="inp" value={form.position} onChange={e=>setF("position",e.target.value)}/></div></div>
              <div className="row2"><div className="field"><label>Где познакомились</label><input className="inp" value={form.metPlace} onChange={e=>setF("metPlace",e.target.value)}/></div><div className="field"><label>Когда</label><input className="inp" value={form.metWhen} onChange={e=>setF("metWhen",e.target.value)}/></div></div>
              <div className="field"><label>Уровень</label><div className="lvl-bar">{LEVELS.map(l=><button key={l.n} className="lvl-btn" onClick={()=>setF("level",form.level===l.n?null:l.n)} style={form.level&&form.level>=l.n?{background:l.c,borderColor:l.c,color:"#fff"}:{}}>{l.n}</button>)}</div><div className="lvl-name">{form.level?lvlOf(form.level).label:"Не выбран"}</div></div>
              <div className="field"><label>День рождения</label><input className="inp" type="date" value={form.birthday} onChange={e=>setF("birthday",e.target.value)}/></div>
              <div className="field"><label>Теги</label><div className="tags-wrap">{tagChoices.map(t=>{const tc=tagClr(t);return<button key={t} className="tag" onClick={()=>toggleFTag(t)} style={{background:formTagSet.has(t)?tc.bg:"transparent",borderColor:tc.brd,color:tc.tx}}>{t}</button>;})}</div><input className="inp" value={form.tagsStr} onChange={e=>setF("tagsStr",e.target.value)} placeholder="новый тег…"/></div>
              <div className="field"><label>Соцсети</label>
                {form.socials.map((s,i)=><div key={i} className="social-row"><select className="sel" value={s.type} onChange={e=>updSoc(i,"type",e.target.value)}>{SOCIAL_TYPES.map(t=><option key={t}>{t}</option>)}</select><input className="inp" value={s.value} onChange={e=>updSoc(i,"value",e.target.value)} placeholder="@username"/><button style={{border:"none",background:"transparent",cursor:"pointer",color:"var(--ink3)"}} onClick={()=>rmSoc(i)}><Ic n="x" s={13}/></button></div>)}
                <button className="add-dashed" onClick={addSoc}><Ic n="plus" s={13}/>Добавить соцсеть</button>
              </div>
              <div className="field"><label>Заметки</label><textarea className="ta" value={form.notes} onChange={e=>setF("notes",e.target.value)} placeholder="Темы для разговора, чем может быть полезен…"/></div>
              <div className="btn-row"><button className="btn btn-ghost" onClick={()=>setShowForm(false)}>Отмена</button><button className="btn btn-primary" onClick={saveContact} disabled={!form.name.trim()}><Ic n="check" s={15}/>{editId?"Сохранить":"Добавить"}</button></div>
            </div>
          </div>
        </div>
      )}

      {/* RELATION EDITOR */}
      {relForId&&(()=>{const me=contacts.find(c=>c.id===relForId);if(!me)return null;
        const rIds=new Set(relations.filter(r=>r.a===relForId||r.b===relForId).map(r=>r.a===relForId?r.b:r.a));
        const others=contacts.filter(c=>c.id!==relForId&&!rIds.has(c.id)).sort((a,b)=>a.name.localeCompare(b.name,"ru"));
        const fOthers=relSrch.trim()?others.filter(o=>o.name.toLowerCase().includes(relSrch.toLowerCase())||(o.company||"").toLowerCase().includes(relSrch.toLowerCase())):others;
        return(
          <div className="overlay center" onClick={()=>setRelForId(null)}>
            <div className="sheet sm" onClick={e=>e.stopPropagation()}>
              <div className="sheet-head"><h2>Связь · {me.name}</h2><button className="ibtn" onClick={()=>setRelForId(null)}><Ic n="x" s={17}/></button></div>
              <div className="sheet-body">
                {others.length===0?<div style={{color:"var(--ink2)",fontSize:14}}>Нет других контактов.</div>:<>
                  <div className="field"><label>С кем?</label>
                    <div className="rel-search"><Ic n="search" s={14} st={{color:"var(--ink3)",flexShrink:0}}/><input autoFocus placeholder="Поиск…" value={relSrch} onChange={e=>setRelSrch(e.target.value)}/>{relSrch&&<span onClick={()=>setRelSrch("")} style={{cursor:"pointer",opacity:.6,display:"flex"}}><Ic n="x" s={13}/></span>}</div>
                    <div className="ppl-list">
                      {fOthers.length===0&&<div style={{padding:14,textAlign:"center",color:"var(--ink3)",fontSize:13}}>Не найдено</div>}

                        <div key={o.id} className={"ppl-item"+(relOther===o.id?" sel":"")} onClick={()=>setRelOther(relOther===o.id?"":o.id)}>
                          <div className="ava ava-sm" style={ph?{backgroundImage:"url("+ph+")"}:{background:clrFor(o.name)}}>{!ph&&ini(o.name)}</div>
                          <div><div className="ppl-name">{o.name}</div>{(o.position||o.company)&&<div className="ppl-meta">{[o.position,o.company].filter(Boolean).join(" · ")}</div>}</div>
                          {relOther===o.id&&<div style={{marginLeft:"auto",color:"var(--v)"}}><Ic n="check" s={15}/></div>}
                        </div>
                      );})}
                    </div>
                  </div>
                  <div className="field"><label>Кем приходится</label>
                    <div className="tags-wrap" style={{marginBottom:8}}>{REL_LABELS.map(l=><button key={l} className="tag" onClick={()=>setRelLabel(relLabel===l?"":l)} style={{background:relLabel===l?"rgba(139,92,246,0.18)":"transparent",borderColor:relLabel===l?"var(--v)":"var(--border2)",color:relLabel===l?"var(--v)":"var(--ink2)"}}>{l}</button>)}</div>
                    <input className="inp" value={relLabel} onChange={e=>setRelLabel(e.target.value)} placeholder="или свой вариант…"/>
                  </div>
                  <div className="btn-row"><button className="btn btn-ghost" onClick={()=>setRelForId(null)}>Отмена</button><button className="btn btn-primary" onClick={saveRel} disabled={!relOther}><Ic n="check" s={15}/>Добавить</button></div>
                </>}
              </div>
            </div>
          </div>
        );})()}

      {/* IMPORT */}
      {showImport&&(
        <div className="overlay" onClick={()=>setShowImport(false)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"/>
            <div className="sheet-head"><h2>Импорт</h2><button className="ibtn" onClick={()=>setShowImport(false)}><Ic n="x" s={17}/></button></div>
            <div className="sheet-body">
              <div className="import-grid">
                <div className="imp-card" onClick={()=>vcfRef.current.click()}><div className="imp-ico">📱</div><div className="imp-name">Телефон</div><div className="imp-desc">VCF / vCard</div></div>
                <div className="imp-card" onClick={()=>fileRef.current.click()}><div className="imp-ico">📊</div><div className="imp-name">CSV</div><div className="imp-desc">Excel, Sheets</div></div>
                <div className="imp-card" onClick={()=>bkpRef.current.click()}><div className="imp-ico">💾</div><div className="imp-name">Бэкап</div><div className="imp-desc">JSON файл</div></div>
                <div className="imp-card" onClick={()=>{setShowImport(false);openAdd();}}><div className="imp-ico">✨</div><div className="imp-name">Голос / AI</div><div className="imp-desc">Вручную</div></div>
              </div>
              <div className="tg-card">
                <h3><Ic n="tg" s={14}/>Из Telegram</h3>
                <p>Самый удобный способ — при добавлении нового контакта укажите @username или вставьте ссылку t.me/username в поле Telegram. Или надиктуйте голосом: «Маша Иванова, телеграм @masha».</p>
                <button className="btn btn-green" style={{width:"100%",height:42,minHeight:"unset",fontSize:13}} onClick={()=>{setShowImport(false);openAdd();}}><Ic n="spark" s={13}/>Добавить контакт</button>
              </div>
              <input ref={vcfRef} type="file" accept=".vcf,text/vcard" onChange={importFile} style={{display:"none"}}/>
              <input ref={fileRef} type="file" accept=".csv,text/csv,.json" onChange={importFile} style={{display:"none"}}/>
              <input ref={bkpRef} type="file" accept=".json" onChange={importFile} style={{display:"none"}}/>
            </div>
          </div>
        </div>
      )}

      {/* FILTERS */}
      {showFilters&&(
        <div className="overlay" onClick={()=>setShowFilters(false)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"/>
            <div className="sheet-head"><h2>Фильтры</h2><button className="ibtn" onClick={()=>setShowFilters(false)}><Ic n="x" s={17}/></button></div>
            <div className="sheet-body">
              <div className="field"><label>Уровень близости</label><div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                <button className={"pill"+(!fLvl?" on":"")} onClick={()=>setFLvl(null)}>Любой</button>
                {LEVELS.map(l=><button key={l.n} className={"pill"+(fLvl===l.n?" on":"")} style={fLvl===l.n?{background:l.c,borderColor:l.c,color:"#fff"}:{}} onClick={()=>setFLvl(fLvl===l.n?null:l.n)}>{l.label}</button>)}
              </div></div>
              <div className="btn-row">
                <button className="btn btn-ghost" onClick={()=>{setFLvl(null);setActiveTag(null);}}>Сбросить</button>
                <button className="btn btn-primary" onClick={()=>setShowFilters(false)}><Ic n="check" s={14}/>Готово</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* CONFIRM DELETE */}
      {confirmId&&(
        <div className="overlay center" onClick={()=>setConfirmId(null)}>
          <div className="confirm" onClick={e=>e.stopPropagation()}>
            <h3>Удалить?</h3>
            <p>Это нельзя отменить. Все связи этого человека тоже удалятся.</p>
            <div style={{display:"flex",gap:10}}><button className="btn btn-ghost" style={{flex:1}} onClick={()=>setConfirmId(null)}>Отмена</button><button className="btn btn-danger" style={{flex:1}} onClick={()=>delContact(confirmId)}>Удалить</button></div>
          </div>
        </div>
      )}

      <input ref={fileRef} type="file" accept=".vcf,.csv,.json" onChange={importFile} style={{display:"none"}}/>
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));</script>
</body>
</html>
