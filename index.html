<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Instrument+Sans:wght@400;500;600&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background:#F4EEE3; }
.cb-root {
  --paper:#F4EEE3; --paper-2:#EBE2D2; --card:#FBF8F1; --ink:#221C15; --ink-soft:#6B6253;
  --accent:#B85335; --accent-deep:#8F3D26; --line:rgba(34,28,21,0.10); --line-2:rgba(34,28,21,0.16);
  font-family:'Instrument Sans',system-ui,sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; width:100%; position:relative;
}
.cb-root::before { content:""; position:fixed; inset:0; pointer-events:none; opacity:.4; z-index:0;
  background-image:radial-gradient(rgba(34,28,21,0.035) 1px,transparent 1px); background-size:22px 22px; }
.cb-wrap { max-width:760px; margin:0 auto; padding:26px 18px 120px; position:relative; z-index:1; }
.cb-head { display:flex; align-items:flex-end; justify-content:space-between; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
.cb-title { font-family:'Fraunces',serif; font-weight:600; font-size:34px; line-height:1; letter-spacing:-0.02em; }
.cb-sub { font-size:13px; color:var(--ink-soft); margin-top:8px; display:flex; align-items:center; gap:6px; }
.cb-actions { display:flex; gap:7px; flex-wrap:wrap; }
.cb-btn { font-family:inherit; cursor:pointer; border:none; display:inline-flex; align-items:center; justify-content:center; gap:7px; font-size:14px; font-weight:500; border-radius:100px; padding:11px 16px; transition:all .18s ease; min-height:44px; }
.cb-btn:disabled { opacity:.45; }
.cb-btn-primary { background:var(--accent); color:#FBF8F1; box-shadow:0 2px 0 var(--accent-deep); }
.cb-btn-primary:not(:disabled):active { transform:translateY(1px); box-shadow:0 1px 0 var(--accent-deep); }
.cb-btn-ghost { background:transparent; color:var(--ink-soft); border:1px solid var(--line-2); padding:11px 13px; }
.cb-btn-ghost:active { background:var(--paper-2); color:var(--ink); }
.cb-search { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line-2); border-radius:14px; padding:13px 16px; margin-bottom:14px; }
.cb-search:focus-within { border-color:var(--accent); }
.cb-search input { border:none; outline:none; background:transparent; font-family:inherit; font-size:16px; color:var(--ink); width:100%; }

.cb-tags::-webkit-scrollbar { display:none; }
.cb-chip { white-space:nowrap; cursor:pointer; font-size:13px; font-weight:500; padding:8px 14px; border-radius:100px; border:1px solid var(--line-2); background:transparent; color:var(--ink-soft); font-family:inherit; }
.cb-chip.active { background:var(--ink); color:var(--paper); border-color:var(--ink); }
.cb-bday-banner { background:linear-gradient(100deg,#F6E4D0,#F2D9C2); border:1px solid rgba(184,83,53,0.25); border-radius:14px; padding:14px 16px; margin-bottom:18px; }
.cb-bday-banner h4 { font-family:'Fraunces',serif; font-size:15px; font-weight:600; display:flex; align-items:center; gap:8px; color:var(--accent-deep); margin-bottom:8px; }
.cb-bday-item { font-size:13.5px; display:flex; justify-content:space-between; cursor:pointer; padding:3px 0; }
.cb-bday-item b { color:var(--accent-deep); }
.cb-letter { font-family:'Fraunces',serif; font-weight:600; font-size:15px; color:var(--accent); margin:22px 4px 8px; text-transform:uppercase; letter-spacing:0.04em; }
.cb-letter:first-of-type { margin-top:4px; }
.cb-card { display:flex; align-items:center; gap:14px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 14px; margin-bottom:9px; cursor:pointer; }
.cb-card:active { background:var(--paper-2); }
.cb-avatar { flex-shrink:0; width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; color:#FBF8F1; font-weight:600; font-size:16px; font-family:'Fraunces',serif; overflow:hidden; background-size:cover; background-position:center; }
.cb-card-main { flex:1; min-width:0; }
.cb-card-name { font-weight:600; font-size:16px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cb-card-meta { font-size:13px; color:var(--ink-soft); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:1px; }
.cb-card-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
.cb-card-bday { font-size:11px; font-weight:600; color:var(--accent-deep); background:rgba(184,83,53,0.1); padding:4px 9px; border-radius:100px; display:flex; align-items:center; gap:4px; }
.cb-bars { display:flex; gap:2px; }
.cb-bar { width:5px; height:11px; border-radius:2px; background:var(--line-2); }
.cb-empty { text-align:center; padding:54px 20px; }

.cb-overlay { position:fixed; inset:0; background:rgba(34,28,21,0.42); backdrop-filter:blur(3px); z-index:50; display:flex; align-items:flex-end; justify-content:center; animation:cbFade .2s ease; }

@media (min-width:640px){ .cb-overlay{ align-items:center; } }
.cb-modal { background:var(--paper); width:100%; max-width:560px; max-height:94vh; overflow-y:auto; border-radius:22px 22px 0 0; animation:cbUp .26s cubic-bezier(.2,.8,.2,1); }

.cb-input,.cb-textarea { width:100%; font-family:inherit; font-size:16px; color:var(--ink); background:var(--card); border:1px solid var(--line-2); border-radius:11px; padding:12px 14px; outline:none; }

.cb-social-row { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
.cb-select { font-family:inherit; font-size:14px; color:var(--ink); background:var(--card); border:1px solid var(--line-2); border-radius:11px; padding:12px 8px; outline:none; flex-shrink:0; width:120px; }
.cb-social-row .cb-input { flex:1; }
.cb-add-social { background:transparent; border:1px dashed var(--line-2); color:var(--ink-soft); cursor:pointer; font-family:inherit; font-size:13px; padding:11px; border-radius:11px; width:100%; display:flex; align-items:center; justify-content:center; gap:6px; }
.cb-form-actions { display:flex; gap:10px; margin-top:22px; }
.cb-form-actions .cb-btn { flex:1; }
.cb-ai { background:linear-gradient(125deg,#2B2620,#3A332A); border-radius:16px; padding:16px; margin-bottom:20px; color:#F4EEE3; }
.cb-ai h3 { font-family:'Fraunces',serif; font-size:16px; font-weight:600; display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.cb-ai p { font-size:12.5px; color:#C9BFAE; margin-bottom:12px; line-height:1.45; }
.cb-ai-text { width:100%; font-family:inherit; font-size:15px; color:#F4EEE3; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14); border-radius:11px; padding:12px; outline:none; resize:vertical; min-height:64px; line-height:1.5; }
.cb-ai-text::placeholder { color:#9A917F; }
.cb-ai-row { display:flex; gap:8px; margin-top:10px; }
.cb-mic { flex-shrink:0; width:52px; height:52px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; background:#F4EEE3; color:#2B2620; transition:all .2s; }
.cb-mic.rec { background:var(--accent); color:#fff; animation:pulse 1.3s infinite; }
@keyframes pulse { 0%{ box-shadow:0 0 0 0 rgba(184,83,53,.55);} 70%{ box-shadow:0 0 0 14px rgba(184,83,53,0);} 100%{ box-shadow:0 0 0 0 rgba(184,83,53,0);} }
.cb-ai-go { flex:1; background:var(--accent); color:#fff; border:none; cursor:pointer; font-family:inherit; font-weight:600; font-size:14px; border-radius:11px; display:flex; align-items:center; justify-content:center; gap:8px; }
.cb-ai-go:disabled { opacity:.5; }
.cb-ai-note { font-size:12px; color:#E8C9A8; margin-top:8px; line-height:1.4; }
.cb-form-chips { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:9px; }
.cb-form-chips .cb-chip { padding:7px 13px; font-size:13px; }
.cb-form-chips .cb-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }
/* wizard */
.cb-wiz-progress { height:4px; background:var(--paper-2); border-radius:4px; overflow:hidden; margin:2px 0 4px; }
.cb-wiz-progress > div { height:100%; background:var(--accent); border-radius:4px; transition:width .35s cubic-bezier(.2,.8,.2,1); }
.cb-wiz-count { font-size:12px; color:var(--ink-soft); margin-bottom:18px; }
.cb-wiz-step { animation:cbStep .32s cubic-bezier(.2,.8,.2,1); }
@keyframes cbStep { from { opacity:0; transform:translateX(26px); } to { opacity:1; transform:translateX(0); } }
.cb-wiz-q { font-family:'Fraunces',serif; font-size:25px; font-weight:600; line-height:1.15; letter-spacing:-0.01em; margin-bottom:6px; }
.cb-wiz-hint { font-size:13px; color:var(--ink-soft); margin-bottom:18px; line-height:1.45; }
.cb-wiz-field { margin-bottom:8px; }
.cb-wiz-nav { display:flex; align-items:center; gap:10px; margin-top:26px; }
.cb-wiz-back { width:48px; height:48px; flex-shrink:0; border-radius:14px; border:1px solid var(--line-2); background:transparent; color:var(--ink-soft); cursor:pointer; display:flex; align-items:center; justify-content:center; }
.cb-wiz-back:disabled { opacity:.35; }
.cb-wiz-next { flex:1; min-height:48px; border-radius:14px; border:none; background:var(--accent); color:#fff; font-family:inherit; font-weight:600; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 2px 0 var(--accent-deep); }
.cb-wiz-next:disabled { opacity:.45; box-shadow:none; }
.cb-wiz-skip { display:block; width:100%; text-align:center; margin-top:14px; background:none; border:none; color:var(--ink-soft); font-family:inherit; font-size:13.5px; cursor:pointer; text-decoration:underline; }
.cb-wiz-switch { background:none; border:none; color:var(--accent); font-family:inherit; font-size:13px; cursor:pointer; text-decoration:underline; }
.cb-levels { display:flex; gap:6px; }
.cb-level-seg { flex:1; height:40px; border-radius:9px; border:1px solid var(--line-2); background:var(--card); cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px; color:var(--ink-soft); }
.cb-level-label { font-size:13px; color:var(--ink); font-weight:600; margin-top:8px; text-align:center; }
.cb-photo-pick { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
.cb-photo-prev { width:72px; height:72px; border-radius:18px; background:var(--paper-2); display:flex; align-items:center; justify-content:center; color:var(--ink-soft); overflow:hidden; background-size:cover; background-position:center; flex-shrink:0; }
.cb-detail-top { display:flex; flex-direction:column; align-items:center; text-align:center; padding:8px 0 4px; }
.cb-detail-avatar { width:96px; height:96px; border-radius:28px; display:flex; align-items:center; justify-content:center; color:#FBF8F1; font-weight:600; font-size:34px; font-family:'Fraunces',serif; margin-bottom:14px; overflow:hidden; background-size:cover; background-position:center; }
.cb-detail-name { font-family:'Fraunces',serif; font-size:26px; font-weight:600; }
.cb-detail-role { font-size:14px; color:var(--ink-soft); margin-top:4px; }
.cb-level-badge { display:inline-flex; align-items:center; gap:8px; margin-top:12px; padding:7px 14px; border-radius:100px; font-size:13px; font-weight:600; }
.cb-detail-tags { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:12px; }
.cb-detail-tag { font-size:12px; font-weight:500; background:var(--paper-2); color:var(--ink-soft); padding:5px 11px; border-radius:100px; }
.cb-info { margin-top:20px; display:flex; flex-direction:column; gap:2px; }
.cb-info-row { display:flex; align-items:center; gap:13px; padding:13px 4px; border-bottom:1px solid var(--line); text-decoration:none; color:inherit; border-radius:8px; }
.cb-info-row:active { background:var(--card); }
.cb-info-ico { width:40px; height:40px; border-radius:12px; background:var(--paper-2); color:var(--accent); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.cb-info-label { font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.04em; }
.cb-info-val { font-size:15px; color:var(--ink); font-weight:500; word-break:break-word; }
.cb-note-box { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; margin-top:8px; font-size:14.5px; line-height:1.55; white-space:pre-wrap; }
.cb-confirm { background:var(--paper); border-radius:18px; padding:24px; max-width:360px; width:calc(100% - 36px); text-align:center; }
.cb-confirm h3 { font-family:'Fraunces',serif; font-size:20px; margin-bottom:8px; }
.cb-confirm p { font-size:14px; color:var(--ink-soft); margin-bottom:20px; }
.cb-confirm-actions { display:flex; gap:10px; }
.cb-confirm-actions .cb-btn { flex:1; }
.cb-btn-danger { background:#9A3B2E; color:#FBF8F1; }
.cb-loading { text-align:center; padding:90px; color:var(--ink-soft); }
.cb-spin { animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
/* stats */
.cb-stat-hero { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
.cb-stat-card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; }
.cb-stat-num { font-family:'Fraunces',serif; font-size:32px; font-weight:600; line-height:1; }
.cb-stat-lab { font-size:12.5px; color:var(--ink-soft); margin-top:6px; }
.cb-stat-sec { font-family:'Fraunces',serif; font-size:15px; font-weight:600; margin:20px 0 10px; }
.cb-lvl-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
.cb-lvl-name { font-size:13px; width:130px; flex-shrink:0; color:var(--ink); }
.cb-lvl-track { flex:1; height:10px; background:var(--paper-2); border-radius:6px; overflow:hidden; }

/* settings */
.cb-set-note { font-size:13px; color:var(--ink-soft); line-height:1.5; margin-bottom:16px; }
.cb-set-note a { color:var(--accent); }
.cb-link { color:var(--accent); cursor:pointer; text-decoration:underline; }
/* graph */
.cb-graph-overlay { position:fixed; inset:0; background:var(--paper); z-index:60; display:flex; flex-direction:column; }
.cb-graph-top { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--line); background:var(--paper); z-index:2; }
.cb-graph-top h2 { font-family:'Fraunces',serif; font-size:20px; font-weight:600; }
.cb-graph-stage { flex:1; position:relative; overflow:hidden; touch-action:none; }
.cb-graph-svg { width:100%; height:100%; display:block; }
.cb-graph-ctrl { position:absolute; right:14px; bottom:18px; display:flex; flex-direction:column; gap:8px; z-index:3; }
.cb-zbtn { width:46px; height:46px; border-radius:50%; border:1px solid var(--line-2); background:var(--card); color:var(--ink); font-size:22px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(34,28,21,0.08); }

<div id="root"><div style="padding:90px;text-align:center;font-family:sans-serif;color:#6B6253">Загрузка…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ---------- storage (localStorage + in-memory fallback) ---------- */
const _mem = {};
const storage = {
  async get(k){ try { const v = localStorage.getItem(k); if(v!==null) return {value:v}; } catch(e){} return (k in _mem)?{value:_mem[k]}:null; },
  async set(k,v){ _mem[k]=v; try { localStorage.setItem(k,v); } catch(e){} return {value:v}; },
  async delete(k){ delete _mem[k]; try { localStorage.removeItem(k); } catch(e){} return {deleted:true}; },
};

/* ---------- config ---------- */
const META_KEY = "contacts-db-v2";
const PHOTO_PREFIX = "contact-photo:";
const KEY_STORE = "cb-anthropic-key";
const MODEL = "claude-sonnet-4-6"; // можно заменить на свою модель
const SOCIAL_TYPES = ["Telegram","WhatsApp","Instagram","VK","LinkedIn","X (Twitter)","Facebook","Другое"];
const LEVELS = [
  {n:1,label:"Знаю по имени",color:"#B3A894"},
  {n:2,label:"Знакомый",color:"#C39B62"},
  {n:3,label:"Приятель",color:"#C47A45"},
  {n:4,label:"Хороший знакомый",color:"#BC5E38"},
  {n:5,label:"Друг",color:"#A8442C"},
  {n:6,label:"Близкий человек",color:"#8C2E20"},
];
const levelInfo = (n)=>LEVELS.find(l=>l.n===n)||null;
const AVATAR_COLORS = ["#B85335","#7A6A3A","#3E6B5A","#8F5B6E","#4A5C8A","#A8783B","#5C7A4A","#9A4A4A","#6B5B95","#3D7A7A"];
const TAG_COLORS = [
  {bg:"#E7D7C0",border:"#C9A876",text:"#7A5A1E"},

function compressImage(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{ const img=new Image();
      img.onload=()=>{ const max=460; let w=img.width,h=img.height;
        if(w>h&&w>max){h=h*max/w;w=max;} else if(h>max){w=w*max/h;h=max;}
        const c=document.createElement("canvas"); c.width=w; c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h); resolve(c.toDataURL("image/jpeg",0.74)); };
      img.onerror=reject; img.src=r.result; };
    r.onerror=reject; r.readAsDataURL(file);
  });
}

const emptyForm = { name:"",phone:"",email:"",company:"",position:"",birthday:"",metPlace:"",metWhen:"",level:null,notes:"",tagsStr:"",socials:[],photo:"" };

function GraphView({contacts, photos, onClose}){
  const stageRef=useRef(null), svgRef=useRef(null), zoomRef=useRef(null), simRef=useRef(null);
  useEffect(()=>{
    if(typeof d3==="undefined"||!stageRef.current) return;
    const stage=stageRef.current; const W=stage.clientWidth||360, H=stage.clientHeight||500;
    const svg=d3.select(svgRef.current).attr("viewBox",[0,0,W,H]);
    svg.selectAll("*").remove();
    const g=svg.append("g");

    const tagSet={}; contacts.forEach(c=>(c.tags||[]).forEach(t=>{ tagSet[t]=(tagSet[t]||0)+1; }));
    const personNodes=contacts.map(c=>({ id:"p"+c.id, type:"person", name:c.name, level:c.level||0,
      color:c.level?levelInfo(c.level).color:"#B0A695", r:c.level?8+c.level*3.2:9, photo:photos[c.id]||"" }));
    const tagNodes=Object.keys(tagSet).map(t=>({ id:"t"+t, type:"tag", tag:t }));
    const nodes=[...personNodes,...tagNodes];
    const links=[]; contacts.forEach(c=>(c.tags||[]).forEach(t=>links.push({source:"p"+c.id,target:"t"+t})));

    const defs=svg.append("defs");
    personNodes.filter(n=>n.photo).forEach(n=>{
      const p=defs.append("pattern").attr("id","img-"+n.id).attr("width",1).attr("height",1).attr("patternContentUnits","objectBoundingBox");
      p.append("image").attr("href",n.photo).attr("width",1).attr("height",1).attr("preserveAspectRatio","xMidYMid slice");
    });

    const link=g.append("g").attr("stroke","#C9BCA6").attr("stroke-opacity",0.7)
      .selectAll("line").data(links).join("line").attr("stroke-width",1.3);
    const node=g.append("g").selectAll("g").data(nodes).join("g").style("cursor","pointer");

    const tagN=node.filter(d=>d.type==="tag");
    tagN.append("rect").attr("rx",9).attr("height",18).attr("fill",d=>tagColor(d.tag).bg).attr("stroke",d=>tagColor(d.tag).border);
    tagN.append("text").attr("class","cb-gtag-label").attr("text-anchor","middle").attr("dy","0.32em").style("fill",d=>tagColor(d.tag).text).text(d=>d.tag);
    tagN.each(function(d){ const t=d3.select(this).select("text"); const w=(t.node().getComputedTextLength()||30)+18; d3.select(this).select("rect").attr("width",w).attr("x",-w/2).attr("y",-9); d.w=w; });

    const personN=node.filter(d=>d.type==="person");
    personN.append("circle").attr("r",d=>d.r).attr("fill",d=>d.photo?"url(#img-"+d.id+")":d.color).attr("stroke","#FBF8F1").attr("stroke-width",2);
    personN.filter(d=>!d.photo).append("text").attr("text-anchor","middle").attr("dy","0.34em").attr("fill","#FBF8F1").attr("font-family","Fraunces, serif").attr("font-weight",600).attr("font-size",d=>d.r*0.82).text(d=>initials(d.name));
    personN.append("text").attr("class","cb-gnode-label").attr("text-anchor","middle").attr("dy",d=>d.r+12).text(d=>d.name.split(/\s+/)[0]);

    const sim=d3.forceSimulation(nodes)
      .force("link",d3.forceLink(links).id(d=>d.id).distance(82).strength(0.18))
      .force("charge",d3.forceManyBody().strength(-320))
      .force("center",d3.forceCenter(W/2,H/2))
      .force("collide",d3.forceCollide(d=>(d.type==="tag"?(d.w||40)/2:d.r)+16))
      .force("x",d3.forceX(W/2).strength(0.03)).force("y",d3.forceY(H/2).strength(0.03));
    simRef.current=sim;
    sim.on("tick",()=>{
      link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
      node.attr("transform",d=>"translate("+d.x+","+d.y+")");
    });

    const drag=d3.drag()
      .on("start",(e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on("drag",(e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on("end",(e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; });
    node.call(drag);

    const adj={}; links.forEach(l=>{ (adj[l.source]=adj[l.source]||new Set()).add(l.target); (adj[l.target]=adj[l.target]||new Set()).add(l.source); });
    let selected=null;
    node.on("click",(e,d)=>{ e.stopPropagation();
      selected=selected===d.id?null:d.id;
      if(!selected){ node.attr("opacity",1); link.attr("opacity",1); return; }
      const keep=new Set(adj[d.id]||[]); keep.add(d.id);
      node.attr("opacity",n=>keep.has(n.id)?1:0.15);
      link.attr("opacity",l=>((l.source.id||l.source)===d.id||(l.target.id||l.target)===d.id)?1:0.06);
    });
    svg.on("click",()=>{ selected=null; node.attr("opacity",1); link.attr("opacity",1); });

    const zoom=d3.zoom().scaleExtent([0.2,4]).on("zoom",(e)=>g.attr("transform",e.transform));
    zoomRef.current={zoom,svg}; svg.call(zoom);
    setTimeout(()=>{
      if(!svgRef.current) return;
      const xs=nodes.map(n=>n.x).filter(v=>!isNaN(v)), ys=nodes.map(n=>n.y).filter(v=>!isNaN(v));
      if(!xs.length) return;
      const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
      const bw=Math.max(1,maxX-minX),bh=Math.max(1,maxY-minY),pad=70;
      const scale=Math.min(1.6,Math.max(0.25,Math.min((W-pad)/bw,(H-pad)/bh)));
      const tx=W/2-scale*(minX+maxX)/2, ty=H/2-scale*(minY+maxY)/2;
      svg.transition().duration(600).call(zoom.transform,d3.zoomIdentity.translate(tx,ty).scale(scale));
    },900);
    return ()=>{ sim.stop(); };
  },[]);

  const zoomBy=(k)=>{ const z=zoomRef.current; if(z) z.svg.transition().duration(200).call(z.zoom.scaleBy,k); };
  const resetZoom=()=>{ const z=zoomRef.current; if(z) z.svg.transition().duration(300).call(z.zoom.transform,d3.zoomIdentity); };
  const hasD3=typeof d3!=="undefined";

  return (
    <div className="cb-graph-overlay">
      <div className="cb-graph-top">
        <h2>Карта связей</h2>
        <button className="cb-iconbtn" onClick={onClose}><Ic name="x" size={18}/></button>
      </div>
      <div className="cb-graph-stage" ref={stageRef}>
        <svg className="cb-graph-svg" ref={svgRef}></svg>
        {!hasD3 && <div className="cb-graph-empty">Не удалось загрузить граф. Откройте приложение онлайн хотя бы раз, чтобы библиотека закэшировалась, и попробуйте снова.</div>}
        <div className="cb-graph-legend">
          <div>Точки — люди, цветные чипы — интересы. Линия = общий интерес.</div>
          <div className="lg-row"><span className="lg-dot" style={{background:"#8C2E20"}}/>ближе — крупнее и темнее</div>
          <div className="lg-row"><span className="lg-dot" style={{background:"#B0A695"}}/>без уровня — серые</div>
          <div style={{marginTop:5}}>Тап по человеку — подсветить связи · двумя пальцами зум</div>
        </div>
        <div className="cb-graph-ctrl">
          <button className="cb-zbtn" onClick={()=>zoomBy(1.4)}>+</button>
          <button className="cb-zbtn" onClick={()=>zoomBy(0.7)}>−</button>
          <button className="cb-zbtn" style={{fontSize:15}} onClick={resetZoom} title="Сброс">⟳</button>
        </div>
      </div>
    </div>
  );
}

  const toggleRec=()=>{ if(recording){ recogRef.current&&recogRef.current.stop(); return; } setAiNote("");
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

    const r=new SR(); r.lang="ru-RU"; r.continuous=true; r.interimResults=true;
    let base=aiText?aiText+" ":"";
    r.onresult=(e)=>{ let interim="",fin=""; for(let i=e.resultIndex;i<e.results.length;i++){ const t=e.results[i][0].transcript; if(e.results[i].isFinal) fin+=t; else interim+=t; } if(fin) base+=fin; setAiText(base+interim); };
    r.onerror=(e)=>{ setAiNote(e.error==="not-allowed"?"Нет доступа к микрофону — разрешите его в настройках браузера.":"Ошибка распознавания: "+e.error); setRecording(false); };

  function localParse(text){ const out={notes:text};
    const em=text.match(/[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}/); if(em) out.email=em[0];
    const ph=text.match(/\+?\d[\d\s\-().]{7,}\d/); if(ph) out.phone=ph[0].trim();
    return out;
  }

  const applyParsed=(p)=>{ setForm(f=>({ ...f,

    const prompt=`Ты помощник, который разбирает свободное описание человека по полям карточки контакта.
Верни СТРОГО валидный JSON и ничего больше — без markdown и пояснений.
Структура: {"name":"","phone":"","email":"","company":"","position":"","birthday":"","metPlace":"","metWhen":"","level":null,"tags":[],"socials":[{"type":"","value":""}],"notes":""}
Правила: birthday в формате YYYY-MM-DD если есть полная дата, иначе "". metPlace = где познакомились, metWhen = когда (можно свободным текстом). level = близость 1-6 (1=знаю по имени,2=знакомый,3=приятель,4=хороший знакомый,5=друг,6=близкий человек), если неясно null. socials[].type из: ${SOCIAL_TYPES.join(", ")}. tags — короткие ярлыки. notes — всё прочее важное. Пустое оставляй "" или [].
Описание: "${text}"`;
    try {
      const resp=await fetch("https://api.anthropic.com/v1/messages",{ method:"POST",

        body:JSON.stringify({ model:MODEL, max_tokens:1024, messages:[{role:"user",content:prompt}] }) });

      if(data.error){ throw new Error(data.error.message||"API error"); }
      const raw=(data.content||[]).map(b=>b.type==="text"?b.text:"").join("").trim();

    setAiBusy(false);

  function compressForOCR(file){
    return new Promise((resolve,reject)=>{ const r=new FileReader();
      r.onload=()=>{ const img=new Image(); img.onload=()=>{ const max=1280; let w=img.width,h=img.height;
        if(w>h&&w>max){h=h*max/w;w=max;} else if(h>max){w=w*max/h;h=max;}
        const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
        resolve(c.toDataURL("image/jpeg",0.82)); }; img.onerror=reject; img.src=r.result; };
      r.onerror=reject; r.readAsDataURL(file); });
  }
  const aiFromImage=async(e)=>{ const file=e.target.files&&e.target.files[0]; if(!file) return; e.target.value="";

    setOcrBusy(true); setAiNote("");

Структура: {"name":"","phone":"","email":"","company":"","position":"","birthday":"","metPlace":"","metWhen":"","level":null,"tags":[],"socials":[{"type":"","value":""}],"notes":""}
Правила: @username и ссылки клади в socials с подходящим type из: ${SOCIAL_TYPES.join(", ")}. Текст «о себе»/bio клади в notes. Если поля нет на скриншоте — оставляй "" или []. level всегда null (его задаёт пользователь).`;
      const resp=await fetch("https://api.anthropic.com/v1/messages",{ method:"POST",
        headers:{ "content-type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
        body:JSON.stringify({ model:MODEL, max_tokens:1024, messages:[{ role:"user", content:[
          { type:"image", source:{ type:"base64", media_type:"image/jpeg", data:b64 } },
          { type:"text", text:prompt } ] }] }) });
      const data=await resp.json();
      if(data.error) throw new Error(data.error.message||"API error");
      const raw=(data.content||[]).map(b=>b.type==="text"?b.text:"").join("").trim();
      applyParsed(JSON.parse(raw.replace(/```json|```/g,"").trim()));
      setAiNote("Готово — проверьте поля и дозаполните при необходимости.");
    } catch(err){ setAiNote("Не удалось распознать скриншот ("+(err.message||err)+"). Проверьте API-ключ и баланс."); }
    setOcrBusy(false);
  };
  const saveKey=async()=>{ const k=keyDraft.trim(); setApiKey(k); if(k) await storage.set(KEY_STORE,k); else await storage.delete(KEY_STORE); setShowSettings(false); };

  const exportCSV=()=>{ const cols=["Имя","Телефон","Email","Компания","Должность","День рождения","Где познакомились","Когда познакомились","Уровень","Теги","Соцсети","Заметки"];
    const esc=v=>'"'+String(v==null?"":v).replace(/"/g,'""')+'"';
    const rows=contacts.map(c=>[c.name,c.phone,c.email,c.company,c.position,c.birthday,c.metPlace,c.metWhen,c.level?c.level+" ("+(levelInfo(c.level)||{}).label+")":"",(c.tags||[]).join("; "),(c.socials||[]).map(s=>s.type+": "+s.value).join("; "),c.notes].map(esc).join(","));
    const csv="\uFEFF"+[cols.map(esc).join(","),...rows].join("\n");
    const url=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
    const a=document.createElement("a"); a.href=url; a.download="контакты.csv"; a.click(); URL.revokeObjectURL(url);
  };
  const normPhone=(p)=>String(p||"").replace(/\D/g,"").replace(/^8(?=\d{10}$)/,"7").slice(-10);
  const mergeImport=(rows)=>{
    const existPhones=new Set(contacts.map(c=>normPhone(c.phone)).filter(Boolean));
    const existNames=new Set(contacts.map(c=>c.name.trim().toLowerCase()).filter(Boolean));
    const seenP=new Set(), seenN=new Set();
    let added=0, skipped=0;
    const fresh=[];
    rows.forEach(r=>{
      if(!r.name||!r.name.trim()){ return; }
      const np=normPhone(r.phone), nn=r.name.trim().toLowerCase();
      const dup=(np&&(existPhones.has(np)||seenP.has(np)))||(!np&&(existNames.has(nn)||seenN.has(nn)));
      if(dup){ skipped++; return; }
      if(np) seenP.add(np); else seenN.add(nn);
      fresh.push({ id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
        name:r.name.trim(),phone:r.phone||"",email:r.email||"",company:r.company||"",position:r.position||"",
        birthday:r.birthday||"",metPlace:r.metPlace||"",metWhen:r.metWhen||"",level:r.level||null,
        tags:r.tags||[],socials:r.socials||[],notes:r.notes||"" });
      added++;
    });
    if(fresh.length) persist([...contacts,...fresh]);
    setToast("Добавлено: "+added+(skipped?" · пропущено дублей: "+skipped:""));
    setTimeout(()=>setToast(""),3500);
  };

  function decodeQP(s){ s=s.replace(/=\r?\n/g,""); const b=[]; for(let i=0;i<s.length;i++){ if(s[i]==="="&&/^[0-9A-Fa-f]{2}$/.test(s.substr(i+1,2))){ b.push(parseInt(s.substr(i+1,2),16)); i+=2; } else b.push(s.charCodeAt(i)); } try{ return new TextDecoder("utf-8").decode(new Uint8Array(b)); }catch(e){ return s; } }
  function parseVCF(text){
    const cards=text.split(/BEGIN:VCARD/i).slice(1); const out=[];
    cards.forEach(block=>{
      const raw=block.split(/\r?\n/); const lines=[];
      raw.forEach(l=>{ if(/^[ \t]/.test(l)&&lines.length){ lines[lines.length-1]+=l.slice(1); } else lines.push(l); });
      let fn="",nn="",tel="",email="",org="",title="";
      lines.forEach(line=>{
        if(/^END:VCARD/i.test(line)) return;
        const idx=line.indexOf(":"); if(idx<0) return;
        const keyRaw=line.slice(0,idx); let val=line.slice(idx+1).trim();
        const prop=(keyRaw.split(";")[0].split(".").pop()||"").toUpperCase();
        if(/ENCODING=QUOTED-PRINTABLE/i.test(keyRaw)) val=decodeQP(val);
        if(prop==="FN"&&!fn) fn=val;
        else if(prop==="N"&&!nn){ const p=val.split(";"); nn=[p[1],p[0]].filter(Boolean).join(" ").trim(); }
        else if(prop==="TEL"&&!tel) tel=val.replace(/[^\d+]/g,"");
        else if(prop==="EMAIL"&&!email) email=val;
        else if(prop==="ORG"&&!org) org=val.split(";")[0];
        else if(prop==="TITLE"&&!title) title=val;
      });
      const name=(fn||nn).trim();
      if(name) out.push({name,phone:tel,email,company:org,position:title});
    });
    return out;
  }

  const importFile=(e)=>{ const file=e.target.files&&e.target.files[0]; if(!file) return; const reader=new FileReader();
    reader.onload=()=>{ try{ const text=String(reader.result);
      const isVcf=/\.vcf$/i.test(file.name)||/BEGIN:VCARD/i.test(text.slice(0,200));
      if(isVcf){ mergeImport(parseVCF(text)); }
      else {
        const t=text.replace(/^\uFEFF/,""); const lines=t.split(/\r?\n/).filter(l=>l.trim());
        const parse=(line)=>{ const o=[]; let cur="",q=false; for(let i=0;i<line.length;i++){ const ch=line[i]; if(q){ if(ch==='"'&&line[i+1]==='"'){cur+='"';i++;} else if(ch==='"') q=false; else cur+=ch; } else { if(ch==='"') q=true; else if(ch===","){o.push(cur);cur="";} else cur+=ch; } } o.push(cur); return o; };
        const rows=lines.slice(1).map(line=>{ const f=parse(line); const lv=parseInt(f[8]);
          return { name:f[0]||"",phone:f[1]||"",email:f[2]||"",company:f[3]||"",position:f[4]||"",birthday:f[5]||"",metPlace:f[6]||"",metWhen:f[7]||"",level:lv>=1&&lv<=6?lv:null,tags:(f[9]||"").split(";").map(t=>t.trim()).filter(Boolean),socials:(f[10]||"").split(";").map(s=>{const[ty,...r]=s.split(":");return{type:(ty||"Другое").trim(),value:r.join(":").trim()};}).filter(s=>s.value),notes:f[11]||"" };
        });
        mergeImport(rows);
      }
    }catch(err){ console.error(err); setToast("Не удалось прочитать файл"); setTimeout(()=>setToast(""),3000); } e.target.value=""; };
    reader.readAsText(file);
  };

      </div>

    { q:"Соцсети и мессенджеры", body:(<>
        {form.socials.map((s,i)=>(<div className="cb-social-row" key={i}>

            <button className="cb-btn cb-btn-ghost" onClick={exportCSV} title="Экспорт CSV" disabled={!contacts.length}><Ic name="download" size={16}/></button>
            <button className="cb-btn cb-btn-primary" onClick={openAdd}><Ic name="plus" size={17}/> Добавить</button>
            <input ref={fileRef} type="file" accept=".vcf,.csv,text/vcard,text/csv" onChange={importFile} style={{display:"none"}}/>
          </div>
        </header>

        {loading ? <div className="cb-loading"><Ic name="loader" size={24} cls="cb-spin"/></div>
          : contacts.length===0 ? (
            <div className="cb-empty">
              <div className="cb-empty-ico"><Ic name="user" size={30}/></div>
              <h3>Здесь пока пусто</h3>
              <p>Добавьте первый контакт — можно просто наговорить о человеке голосом, и ИИ сам всё разложит по полям.</p>
              <button className="cb-btn cb-btn-primary" onClick={openAdd} style={{margin:"0 auto"}}><Ic name="plus" size={17}/> Добавить первый контакт</button>
            </div>
          ) : (
            <>
              <div className="cb-search">
                <Ic name="search" size={18}/><input placeholder="Поиск по имени, компании, заметкам…" value={search} onChange={e=>setSearch(e.target.value)}/>
                {search && <span onClick={()=>setSearch("")} style={{cursor:"pointer",display:"flex"}}><Ic name="x" size={16}/></span>}
              </div>
              {allTags.length>0 && (
                <div className="cb-tags">
                  <button className={"cb-chip"+(!activeTag?" active":"")} onClick={()=>setActiveTag(null)}>Все</button>
                  {allTags.map(t=><button key={t} className={"cb-chip"+(activeTag===t?" active":"")} onClick={()=>setActiveTag(activeTag===t?null:t)}>{t}</button>)}
                </div>
              )}
              {upcoming.length>0 && !search && !activeTag && (
                <div className="cb-bday-banner">
                  <h4><Ic name="cake" size={15}/> Скоро дни рождения</h4>
                  {upcoming.map(({c,d})=>(<div key={c.id} className="cb-bday-item" onClick={()=>setViewId(c.id)}><span style={{fontWeight:500}}>{c.name}</span><b>{d===0?"сегодня!":d===1?"завтра":"через "+d+" "+pluralDays(d)}</b></div>))}
                </div>
              )}
              {grouped.length===0 ? <div className="cb-empty"><p style={{marginTop:40}}>Ничего не нашлось.</p></div>
                : grouped.map(([letter,items])=>(
                  <div key={letter}>
                    <div className="cb-letter">{letter}</div>
                    {items.map(c=>{ const d=daysUntilBirthday(c.birthday); const ph=photos[c.id]; const li=levelInfo(c.level);
                      return (
                        <div key={c.id} className="cb-card" onClick={()=>setViewId(c.id)}>
                          <div className="cb-avatar" style={ph?{backgroundImage:"url("+ph+")"}:{background:colorFor(c.name)}}>{!ph&&initials(c.name)}</div>
                          <div className="cb-card-main"><div className="cb-card-name">{c.name}</div><div className="cb-card-meta">{[c.position,c.company].filter(Boolean).join(" · ")||c.phone||c.email||"—"}</div></div>
                          <div className="cb-card-right">
                            {d!==null&&d<=7 && <div className="cb-card-bday"><Ic name="cake" size={11}/> {d===0?"сегодня":d+"д"}</div>}
                            {li && <div className="cb-bars" title={li.label}>{[1,2,3,4,5,6].map(i=><div key={i} className="cb-bar" style={i<=c.level?{background:li.color}:{}}/>)}</div>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ))}
            </>
          )}
      </div>

      {/* DETAIL */}
      {viewing && (()=>{ const ph=photos[viewing.id]; const li=levelInfo(viewing.level); return (
        <div className="cb-overlay" onClick={()=>setViewId(null)}>
          <div className="cb-modal" onClick={e=>e.stopPropagation()}>
            <div className="cb-modal-head">
              <button className="cb-iconbtn" onClick={()=>setViewId(null)}><Ic name="chevronLeft" size={20}/></button>
              <div style={{display:"flex",gap:8}}>
                <button className="cb-iconbtn" onClick={()=>openEdit(viewing)}><Ic name="pencil" size={16}/></button>
                <button className="cb-iconbtn" onClick={()=>setConfirmId(viewing.id)}><Ic name="trash" size={16}/></button>
              </div>
            </div>
            <div className="cb-modal-body">
              <div className="cb-detail-top">
                <div className="cb-detail-avatar" style={ph?{backgroundImage:"url("+ph+")"}:{background:colorFor(viewing.name)}}>{!ph&&initials(viewing.name)}</div>
                <div className="cb-detail-name">{viewing.name}</div>
                {(viewing.position||viewing.company) && <div className="cb-detail-role">{[viewing.position,viewing.company].filter(Boolean).join(" · ")}</div>}
                {li && <div className="cb-level-badge" style={{background:li.color+"22",color:li.color}}><span className="cb-bars">{[1,2,3,4,5,6].map(i=><span key={i} className="cb-bar" style={Object.assign({height:12},i<=viewing.level?{background:li.color}:{})}/>)}</span>{li.label}</div>}
                {(viewing.tags||[]).length>0 && <div className="cb-detail-tags">{viewing.tags.map(t=><span key={t} className="cb-detail-tag">{t}</span>)}</div>}
              </div>
              <div className="cb-info">
                {viewing.phone && <a className="cb-info-row" href={"tel:"+viewing.phone}><div className="cb-info-ico"><Ic name="phone" size={17}/></div><div><div className="cb-info-label">Телефон</div><div className="cb-info-val">{viewing.phone}</div></div></a>}
                {viewing.email && <a className="cb-info-row" href={"mailto:"+viewing.email}><div className="cb-info-ico"><Ic name="mail" size={17}/></div><div><div className="cb-info-label">Email</div><div className="cb-info-val">{viewing.email}</div></div></a>}
                {viewing.company && <div className="cb-info-row"><div className="cb-info-ico"><Ic name="building" size={17}/></div><div><div className="cb-info-label">Компания</div><div className="cb-info-val">{viewing.company}</div></div></div>}
                {viewing.metPlace && <div className="cb-info-row"><div className="cb-info-ico"><Ic name="mapPin" size={17}/></div><div><div className="cb-info-label">Где познакомились</div><div className="cb-info-val">{viewing.metPlace}</div></div></div>}
                {viewing.metWhen && <div className="cb-info-row"><div className="cb-info-ico"><Ic name="calHeart" size={17}/></div><div><div className="cb-info-label">Когда познакомились</div><div className="cb-info-val">{viewing.metWhen}</div></div></div>}
                {viewing.birthday && <div className="cb-info-row"><div className="cb-info-ico"><Ic name="cake" size={17}/></div><div><div className="cb-info-label">День рождения</div><div className="cb-info-val">{formatBirthday(viewing.birthday)}</div></div></div>}
                {(viewing.socials||[]).map((s,i)=><div className="cb-info-row" key={i}><div className="cb-info-ico"><Ic name="send" size={16}/></div><div><div className="cb-info-label">{s.type}</div><div className="cb-info-val">{s.value}</div></div></div>)}
              </div>
              {viewing.notes && <div style={{marginTop:20}}><div className="cb-info-label" style={{marginBottom:8,display:"flex",alignItems:"center",gap:6}}><Ic name="note" size={13}/> Заметки</div><div className="cb-note-box">{viewing.notes}</div></div>}
            </div>
          </div>
        </div>
      ); })()}

      {/* FORM (классическая, полная) */}
      {showForm && !wizardMode && (
        <div className="cb-overlay" onClick={()=>setShowForm(false)}>
          <div className="cb-modal" onClick={e=>e.stopPropagation()}>
            <div className="cb-modal-head"><h2>{editId?"Редактировать":"Новый контакт"}</h2><button className="cb-iconbtn" onClick={()=>setShowForm(false)}><Ic name="x" size={18}/></button></div>
            <div className="cb-modal-body">
              {aiPanelEl}

              <div className="cb-field"><label>Фото</label>
                <div className="cb-photo-pick">
                  <div className="cb-photo-prev" style={form.photo?{backgroundImage:"url("+form.photo+")"}:{}}>{!form.photo&&<Ic name="user" size={26}/>}</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button className="cb-btn cb-btn-ghost" onClick={()=>photoRef.current.click()}><Ic name="camera" size={16}/> {form.photo?"Заменить":"Добавить фото"}</button>
                    {form.photo && <button className="cb-btn cb-btn-ghost" onClick={()=>setF("photo","")}><Ic name="x" size={16}/> Убрать</button>}
                  </div>
                  <input ref={photoRef} type="file" accept="image/*" onChange={pickPhoto} style={{display:"none"}}/>
                </div>
              </div>

              <div className="cb-field"><label>Имя *</label><input className="cb-input" value={form.name} onChange={e=>setF("name",e.target.value)} placeholder="Иван Петров"/></div>
              <div className="cb-row2">
                <div className="cb-field"><label>Телефон</label><input className="cb-input" inputMode="tel" value={form.phone} onChange={e=>setF("phone",e.target.value)} placeholder="+7 999 123-45-67"/></div>
                <div className="cb-field"><label>Email</label><input className="cb-input" inputMode="email" value={form.email} onChange={e=>setF("email",e.target.value)}/></div>
              </div>
              <div className="cb-row2">
                <div className="cb-field"><label>Компания</label><input className="cb-input" value={form.company} onChange={e=>setF("company",e.target.value)}/></div>
                <div className="cb-field"><label>Должность</label><input className="cb-input" value={form.position} onChange={e=>setF("position",e.target.value)}/></div>
              </div>
              <div className="cb-row2">
                <div className="cb-field"><label>Где познакомились</label><input className="cb-input" value={form.metPlace} onChange={e=>setF("metPlace",e.target.value)} placeholder="Конференция, через друзей…"/></div>
                <div className="cb-field"><label>Когда познакомились</label><input className="cb-input" value={form.metWhen} onChange={e=>setF("metWhen",e.target.value)} placeholder="Март 2023 / недавно"/></div>
              </div>
              <div className="cb-field"><label>Уровень отношений</label>
                <div className="cb-levels">{LEVELS.map(l=>(<button key={l.n} className="cb-level-seg" onClick={()=>setF("level",form.level===l.n?null:l.n)} style={form.level&&form.level>=l.n?{background:l.color,borderColor:l.color,color:"#fff"}:{}}>{l.n}</button>))}</div>
                <div className="cb-level-label">{form.level?levelInfo(form.level).label:"Не выбран"}</div>
              </div>
              <div className="cb-field"><label>День рождения</label><input className="cb-input" type="date" value={form.birthday} onChange={e=>setF("birthday",e.target.value)}/></div>
              <div className="cb-field"><label>Теги</label>{tagChipsEl}<input className="cb-input" value={form.tagsStr} onChange={e=>setF("tagsStr",e.target.value)} placeholder="добавить новый тег…"/></div>
              <div className="cb-field"><label>Соцсети и мессенджеры</label>
                {form.socials.map((s,i)=>(<div className="cb-social-row" key={i}>
                  <select className="cb-select" value={s.type} onChange={e=>updSocial(i,"type",e.target.value)}>{SOCIAL_TYPES.map(t=><option key={t}>{t}</option>)}</select>
                  <input className="cb-input" value={s.value} onChange={e=>updSocial(i,"value",e.target.value)} placeholder="@username / ссылка"/>
                  <button className="cb-iconbtn" onClick={()=>rmSocial(i)}><Ic name="x" size={15}/></button>
                </div>))}
                <button className="cb-add-social" onClick={addSocial}><Ic name="plus" size={14}/> Добавить соцсеть</button>
              </div>
              <div className="cb-field"><label>Заметки</label><textarea className="cb-textarea" value={form.notes} onChange={e=>setF("notes",e.target.value)} placeholder="Важные детали, темы для разговора…"/></div>
              <div className="cb-form-actions">
                <button className="cb-btn cb-btn-ghost" style={{flex:1}} onClick={()=>setShowForm(false)}>Отмена</button>
                <button className="cb-btn cb-btn-primary" onClick={saveContact} disabled={!form.name.trim()}><Ic name="check" size={16}/> {editId?"Сохранить":"Добавить"}</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* WIZARD (пошаговое добавление) */}
      {showForm && wizardMode && (
        <div className="cb-overlay" onClick={()=>setShowForm(false)}>
          <div className="cb-modal" onClick={e=>e.stopPropagation()}>
            <div className="cb-modal-head"><h2>Новый контакт</h2><button className="cb-iconbtn" onClick={()=>setShowForm(false)}><Ic name="x" size={18}/></button></div>
            <div className="cb-modal-body">
              <div className="cb-wiz-progress"><div style={{width:((wizStep+1)/wizTotal*100)+"%"}}/></div>
              <div className="cb-wiz-count">Шаг {wizStep+1} из {wizTotal} · <button className="cb-wiz-switch" onClick={()=>setWizardMode(false)}>все поля сразу</button></div>
              <div className="cb-wiz-step" key={wizStep}>
                <div className="cb-wiz-q">{wizCur.q}</div>
                {wizCur.hint && <div className="cb-wiz-hint">{wizCur.hint}</div>}
                <div className="cb-wiz-field">{wizCur.body}</div>
              </div>
              <div className="cb-wiz-nav">
                <button className="cb-wiz-back" onClick={()=>setWizStep(s=>Math.max(0,s-1))} disabled={wizStep===0}><Ic name="arrowLeft" size={20}/></button>
                {wizLast
                  ? <button className="cb-wiz-next" onClick={saveContact} disabled={!form.name.trim()}><Ic name="check" size={18}/> Сохранить контакт</button>
                  : <button className="cb-wiz-next" onClick={()=>setWizStep(s=>s+1)} disabled={!wizCanNext}>Дальше <Ic name="arrowRight" size={18}/></button>}
              </div>
              {!wizLast && !wizCur.required && <button className="cb-wiz-skip" onClick={()=>setWizStep(s=>s+1)}>Пропустить</button>}
              {!wizLast && form.name.trim() && <button className="cb-wiz-skip" onClick={saveContact}>Сохранить сейчас</button>}
            </div>
          </div>
        </div>
      )}

      {/* STATS */}
      {showStats && (
        <div className="cb-overlay" onClick={()=>setShowStats(false)}>
          <div className="cb-modal" onClick={e=>e.stopPropagation()}>
            <div className="cb-modal-head"><h2>Статистика</h2><button className="cb-iconbtn" onClick={()=>setShowStats(false)}><Ic name="x" size={18}/></button></div>
            <div className="cb-modal-body">
              <div className="cb-stat-hero">
                <div className="cb-stat-card"><div className="cb-stat-num">{contacts.length}</div><div className="cb-stat-lab">всего контактов</div></div>
                <div className="cb-stat-card"><div className="cb-stat-num" style={{color:"#8C2E20"}}>{stats.close}</div><div className="cb-stat-lab">близкий круг (друзья и близкие)</div></div>
                <div className="cb-stat-card"><div className="cb-stat-num">{stats.withPhoto}</div><div className="cb-stat-lab">с фотографией</div></div>
                <div className="cb-stat-card"><div className="cb-stat-num" style={{color:"#B85335"}}>{stats.bdays}</div><div className="cb-stat-lab">дней рождения в ближайший месяц</div></div>
              </div>
              <div className="cb-stat-sec">По уровню отношений</div>
              {LEVELS.slice().reverse().map(l=>{ const ct=stats.byLevel[l.n]; return (
                <div className="cb-lvl-row" key={l.n}>
                  <div className="cb-lvl-name">{l.label}</div>
                  <div className="cb-lvl-track"><div className="cb-lvl-fill" style={{width:(ct/stats.maxLvl*100)+"%",background:l.color}}/></div>
                  <div className="cb-lvl-ct">{ct}</div>
                </div>
              ); })}
              {stats.topTags.length>0 && <><div className="cb-stat-sec">Популярные теги</div>
                <div className="cb-tagstat">{stats.topTags.map(([t,c])=><span key={t}>{t} <b>{c}</b></span>)}</div></>}
            </div>
          </div>
        </div>
      )}

      {/* SETTINGS */}
      {showSettings && (
        <div className="cb-overlay" onClick={()=>setShowSettings(false)}>
          <div className="cb-modal" onClick={e=>e.stopPropagation()}>
            <div className="cb-modal-head"><h2>Настройки</h2><button className="cb-iconbtn" onClick={()=>setShowSettings(false)}><Ic name="x" size={18}/></button></div>
            <div className="cb-modal-body">
              <div className="cb-set-note">
                Для <b>умного голосового разбора</b> приложение обращается к модели Claude напрямую с вашим ключом. Получить ключ можно в консоли Anthropic: <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>. Ключ хранится только на этом устройстве и никуда больше не передаётся. Без ключа голосовой ввод тоже работает, но разбирает проще (выделяет телефон и почту).
              </div>
              <div className="cb-field"><label>Anthropic API-ключ</label>
                <input className="cb-input" type="password" value={keyDraft} onChange={e=>setKeyDraft(e.target.value)} placeholder="sk-ant-..."/>
              </div>
              <div className="cb-form-actions">
                <button className="cb-btn cb-btn-ghost" style={{flex:1}} onClick={()=>{setKeyDraft("");}}>Очистить</button>
                <button className="cb-btn cb-btn-primary" onClick={saveKey}><Ic name="check" size={16}/> Сохранить</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* CONFIRM */}
      {confirmId && (
        <div className="cb-overlay" style={{alignItems:"center"}} onClick={()=>setConfirmId(null)}>
          <div className="cb-confirm" onClick={e=>e.stopPropagation()}>
            <h3>Удалить контакт?</h3><p>Это действие нельзя отменить.</p>
            <div className="cb-confirm-actions">
              <button className="cb-btn cb-btn-ghost" onClick={()=>setConfirmId(null)}>Отмена</button>
              <button className="cb-btn cb-btn-danger" onClick={()=>deleteContact(confirmId)}>Удалить</button>
            </div>
          </div>
        </div>
      )}
      {showGraph && <GraphView contacts={contacts} photos={photos} onClose={()=>setShowGraph(false)}/>}
      {toast && <div className="cb-toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
/* Регистрируем service worker — работает только при размещении по https (или localhost) */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
</script>
</body>
</html>
